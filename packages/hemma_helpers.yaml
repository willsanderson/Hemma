# packages/hemma_helpers.yaml
# ============================================================================
# REQUIRED: Hemma Dashboard Helper Entities
#
# These helper entities are required for the Hemma dashboard to function.
# Place this file in your /config/packages/ directory and ensure packages
# are enabled in your configuration.yaml:
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# ENTITIES CREATED:
#   - input_boolean.hemma_thermostat_overlay: Thermostat card temperature adjustment overlay
#   - input_boolean.hemma_mobile_navigation: Mobile nav menu state
#   - input_boolean.hemma_motion_badges: Show/hide motion sensor badges on navbar
#   - input_select.hemma_expanded_row: Which sub-badge row is expanded (none/climate/presence/media)
#   - input_number.hemma_thermostat_target_temperature: Thermostat target temp
#   - input_select.hemma_thermostat_mode: Heat/Cool mode selector
#   - sensor.hemma_mobile_dynamic_background: Shared dynamic mobile backgrounds (morning/afternoon/night)
#
# OPTIONAL: Adjust min/max values for input_number to match your climate needs.
# ============================================================================

input_boolean:
  hemma_thermostat_overlay:
    name: Thermostat Overlay
    initial: off

  hemma_mobile_navigation:
    name: Mobile Navigation
    initial: off

  hemma_lock_overlay:
    name: Lock Overlay
    initial: off

  hemma_motion_badges:
    name: Motion Badges
    initial: on

input_text:
  # Motion sensor entity IDs for navbar badges (desktop + mobile).
  # Leave initial as "" to disable the badge for that room.
  hemma_motion_living_room:
    name: "Hemma Motion - Living Room"
    initial: "binary_sensor.living_room_hub_motion"
  hemma_motion_bedroom:
    name: "Hemma Motion - Bedroom"
    initial: "binary_sensor.hue_motion_sensor_motion"
  hemma_motion_kitchen:
    name: "Hemma Motion - Kitchen"
    initial: ""   # set to your kitchen motion sensor entity ID to enable

input_number:
  hemma_thermostat_target_temperature:
    name: Thermostat Target Temperature
    # Celsius users: min: 15, max: 30, step: 0.5, unit_of_measurement: "°C"
    min: 68
    max: 75
    step: 1
    unit_of_measurement: "°F"
    mode: slider

input_select:
  hemma_expanded_row:
    name: Expanded Badge Row
    options:
      - none
      - climate
      - presence
      - media
      - lights
    initial: none

  hemma_thermostat_mode:
    name: Thermostat Mode
    options:
      - cool
      - heat
    initial: cool


template:
  - trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id: sun.sun
      - platform: time_pattern
        minutes: "/5"
    sensor:
      - name: "Hemma Dynamic Mobile Backgrounds"
        unique_id: hemma_mobile_dynamic_background
        icon: mdi:image-filter-hdr
        state: >
          {% set elevation = state_attr('sun.sun', 'elevation') | float(-90) %}
          {% set rising = state_attr('sun.sun', 'rising') %}
          {% if elevation < -6 %}
            sunset
          {% elif elevation < 6 %}
            {{ 'dawn' if rising else 'sunset' }}
          {% elif elevation < 24 %}
            {{ 'morning' if rising else 'goldenhour' }}
          {% elif elevation < 50 %}
            {{ 'morning' if rising else 'afternoon' }}
          {% else %}
            midday
          {% endif %}
        attributes:
          elevation: "{{ state_attr('sun.sun', 'elevation') }}"
          rising: "{{ state_attr('sun.sun', 'rising') }}"
          next_rising: "{{ state_attr('sun.sun', 'next_rising') }}"
          next_setting: "{{ state_attr('sun.sun', 'next_setting') }}"

  - sensor:
      - name: hemma_mobile_background_url
        unique_id: hemma_mobile_background_url
        state: >
          {% set phase = states('sensor.hemma_mobile_dynamic_background') | lower %}
          {% if phase in ['morning','dawn'] %}
            {% set p = 'morning' %}
          {% elif phase in ['night','evening','sunset'] %}
            {% set p = 'night' %}
          {% else %}
            {% set p = 'day' %}
          {% endif %}

          {% set dark = '-dark' if is_state('sun.sun','below_horizon') else '' %}

          /local/hemma/mobile/mobile-{{ p }}{{ dark }}.jpg

script:
  hemma_light_smart_toggle:
    alias: "Hemma - Smart Light Toggle"
    description: >
      Saves the current light state before turning off.
      For light groups, snapshots each individual member so only
      the lights that were on get restored (not the whole group).
      Falls back to a plain turn_on if no saved state exists yet.
    mode: queued
    max: 5
    sequence:
      - variables:
          scene_id: "hemma_restore_{{ light_entity | replace('.', '_') }}"
          scene_entity: "scene.hemma_restore_{{ light_entity | replace('.', '_') }}"
      - choose:
          # Light is ON → snapshot current state then turn off
          - conditions:
              - condition: template
                value_template: "{{ states(light_entity) == 'on' }}"
            sequence:
              - service: scene.create
                data:
                  scene_id: "{{ scene_id }}"
                  snapshot_entities: >-
                    {% set m = state_attr(light_entity, 'entity_id') %}
                    {% if m %}{{ m }}{% else %}{{ [light_entity] }}{% endif %}
              - service: light.turn_off
                data:
                  transition: 2
                target:
                  entity_id: "{{ light_entity }}"
        # Light is OFF → restore snapshot if it exists, otherwise turn on normally
        default:
          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ scene_entity in (states.scene | map(attribute='entity_id') | list) }}
                sequence:
                  - service: scene.turn_on
                    data:
                      entity_id: "{{ scene_entity }}"
                      transition: 2
            default:
              - service: light.turn_on
                data:
                  transition: 2
                target:
                  entity_id: "{{ light_entity }}"

automation:
  # Auto-expand the media row when media is actively playing.
  # Triggers on HA startup (handles page-load defaults) and whenever
  # any media player begins playing. Only acts if the row is currently
  # collapsed so manual selections by the user are never overridden.
  - alias: "Hemma - Auto-expand media row when playing"
    id: hemma_auto_expand_media_row
    trigger:
      - platform: homeassistant
        event: start
      - platform: template
        value_template: >
          {{ states.media_player
             | selectattr('state', 'in', ['playing', 'buffering'])
             | list | count > 0 }}
    condition:
      - condition: template
        value_template: >
          {{ states('input_select.hemma_expanded_row') == 'none'
             and (states.media_player
                  | selectattr('state', 'in', ['playing', 'buffering'])
                  | list | count > 0) }}
    action:
      - service: input_select.select_option
        data:
          entity_id: input_select.hemma_expanded_row
          option: media

