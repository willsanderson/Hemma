Hemma:
  modes:
    light:
      # ============================================================================
      # MODE: LIGHT — SURFACES / BACKGROUNDS / TEXT
      # ============================================================================

      primary-background-color: rgb(50,50,50)
      secondary-background-color: rgb(40,40,40)
      ha-card-background: rgba(20,20,20,0.1)
      ha-card-background-active: rgba(255,255,255,0.24)
      text-primary-color: rgba(255,255,255,0.95)
      secondary-text-color: rgba(245,245,245,0.8)
      disabled-text-color: rgba(208,208,208,0.5)
      sidebar-background-color: var(--ha-card-background)
      sidebar-icon-color: var(--primary-text-color)
      sidebar-text-color: "#c9c9c9"
      dark-vignette: 0

      # ============================================================================
      # MODE: LIGHT — ENTITY TOKENS
      # ============================================================================

      hemma-entity-background: rgba(20,20,20,0.1)
      hemma-entity-background-active: rgba(255,255,255,0.24)
      hemma-entity-active: rgba(255,255,255,1)
      hemma-entity-inactive: rgba(240,240,240,0.8)

      # ============================================================================
      # MODE: LIGHT — NAV / POPUP / CONTROL TOKENS
      # ============================================================================

      navbar-primary-color: var(--hemma-nav-icon-active)
      hemma-nav-bg: rgba(20,20,20,0.1)
      hemma-nav-border: transparent
      hemma-nav-shadow: 0 3px 9px rgba(0,0,0,0.05)
      hemma-nav-specular-start: rgba(255,255,255,0.48)
      hemma-nav-specular-mid: rgba(255,255,255,0.26)
      hemma-nav-specular-end: rgba(255,255,255,0.44)
      hemma-nav-inactive-opacity: 0.7
      hemma-nav-icon: rgba(255,255,255,0.85)
      hemma-nav-icon-active: rgba(255,255,255,1)
      hemma-nav-active-fill: rgba(255,255,255,0.2)
      hemma-nav-fade: |
        linear-gradient(
          to top,
          rgba(100,100,100,0.85) 0%,
          rgba(100,100,100,0.47) 20%,
          rgba(100,100,100,0.28) 40%,
          rgba(100,100,100,0.15) 60%,
          rgba(100,100,100,0.00) 90%
        )
      hemma-nav-fade-top: 80svh

      hemma-popup-bg: rgba(200,200,200,0.1)
      hemma-popup-specular-start: rgba(255,255,255,0.26)
      hemma-popup-specular-mid: rgba(255,255,255,0.24)
      hemma-popup-specular-end: rgba(255,255,255,0.22)

      hemma-card-specular-start: rgba(255,255,255,0.25)
      hemma-card-specular-mid: rgba(255,255,255,0.12)
      hemma-card-specular-end: rgba(255,255,255,0.22)

      hemma-control-off: rgba(0,0,0,0.1)
      hemma-control-on: rgba(255,255,255,0.2)
      thermostat-card-off: var(--hemma-control-off)
      thermostat-card-on: var(--hemma-control-on)

      hemma-puck-font-color: rgba(0,0,0,.5)
      hemma-puck-font-color-active: rgba(0,0,0,.6)
      hemma-puck-icon-color: rgba(255,255,255,0.5)
      hemma-puck-icon-color-active: rgba(255,255,255,0.7)

      hemma-toggle-thumb-active: rgba(80,80,80,0.45)
      hemma-toggle-thumb-inactive: rgba(255,255,255,0.8)
      hemma-toggle-border-active: none
      hemma-toggle-border-inactive: rgba(255,255,255,0.45)

      # ============================================================================
      # MODE: LIGHT — COMPONENT / SYSTEM TOKENS
      # ============================================================================

      ha-card-box-shadow: var(--ha-card-box-shadow-light)
      button-card-box-shadow: var(--ha-shadow-light)
      button-card-box-shadow-active: var(--ha-shadow-light)

      ha-color-border-neutral-normal: transparent
      ha-color-fill-primary-normal-resting: var(--hemma-nav-bg)
      ha-color-fill-primary-quiet-resting: rgba(100,100,100,0.25)
      wa-color-text-quiet: var(--secondary-text-color)

      mdc-text-field-fill-color: rgba(50,50,50,0.4)
      mdc-select-fill-color: rgba(50,50,50,0.4)
      mdc-theme-surface: var(--ha-card-background)
      md-list-container-color: var(--ha-card-background)
      dialog-background-color: var(--ha-card-background)
      ha-dialog-background: rgba(255,255,255,0.1)
      ha-dialog-surface-background: rgba(255,255,255,0.1)

    dark:
      # ============================================================================
      # MODE: DARK — SURFACES / BACKGROUNDS / TEXT
      # ============================================================================

      primary-background-color: rgb(40,40,40)
      secondary-background-color: rgb(20,20,20)
      ha-card-background: rgba(0,0,0,0.4)
      ha-card-background-active: rgba(240,240,240,0.07)
      text-primary-color: rgba(255,255,255,0.98)
      secondary-text-color: rgba(240,240,240,0.9)
      disabled-text-color: rgba(208,208,208,0.5)
      sidebar-background-color: var(--ha-card-background)
      sidebar-icon-color: "#9f9fa1"
      sidebar-text-color: "#a8a8a8"

      vignette-alpha: 0.78
      vignette-edge: 0.68
      vignette-bottom: 0.34
      dark-vignette: 1

      # ============================================================================
      # MODE: DARK — ENTITY TOKENS
      # ============================================================================

      hemma-entity-background: rgba(0,0,0,.08)
      hemma-entity-background-active: rgba(255,255,255,0.2)
      hemma-entity-active: rgba(255,255,255,1)
      hemma-entity-inactive: rgba(240,240,240,0.7)

      # ============================================================================
      # MODE: DARK — NAV / POPUP / CONTROL TOKENS
      # ============================================================================

      navbar-primary-color: var(--hemma-nav-icon-active)
      hemma-nav-bg: rgba(0,0,0,0.25)
      hemma-nav-border: transparent
      hemma-nav-shadow: 0 12px 24px rgba(0,0,0,0.04)
      hemma-nav-specular-start: rgba(255,255,255,0.3)
      hemma-nav-specular-mid: rgba(255,255,255,0.20)
      hemma-nav-specular-end: rgba(255,255,255,0.3)
      hemma-nav-inactive-opacity: 0.72
      hemma-nav-icon: rgba(255,255,255,0.96)
      hemma-nav-icon-active: rgba(255,255,255,0.96)
      hemma-nav-active-fill: rgba(255,255,255,0.2)
      hemma-nav-fade: |
        linear-gradient(
          to top,
          rgba(30,30,30,0.72) 0%,
          rgba(30,30,30,0.52) 10%,
          rgba(30,30,30,0.28) 25%,
          rgba(30,30,30,0.10) 40%,
          rgba(30,30,30,0.00) 60%
        )
      hemma-nav-fade-top: 80svh

      hemma-popup-bg: rgba(0,0,0,0.2)
      hemma-popup-specular-start: rgba(255,255,255,0.28)
      hemma-popup-specular-mid: rgba(255,255,255,0.22)
      hemma-popup-specular-end: rgba(255,255,255,0.20)

      hemma-card-specular-start: rgba(255,255,255,0.20)
      hemma-card-specular-mid: rgba(255,255,255,0.09)
      hemma-card-specular-end: rgba(255,255,255,0.15)

      hemma-control-off: rgba(0,0,0,0.2)
      hemma-control-on: rgba(255,255,255,0.2)
      thermostat-card-off: var(--hemma-control-off)
      thermostat-card-on: var(--hemma-control-on)

      hemma-puck-font-color: rgba(0,0,0,.8)
      hemma-puck-font-color-active: rgba(0,0,0,.7)
      hemma-puck-icon-color: rgba(255,255,255,0.5)
      hemma-puck-icon-color-active: rgba(255,255,255,0.7)

      hemma-toggle-thumb-active: rgba(80,80,80,0.45)
      hemma-toggle-thumb-inactive: rgba(255,255,255,0.8)
      hemma-toggle-border-active: none
      hemma-toggle-border-inactive: rgba(255,255,255,0.45)

      # ============================================================================
      # MODE: DARK — COMPONENT / SYSTEM TOKENS
      # ============================================================================

      ha-card-box-shadow: var(--ha-card-box-shadow-dark)
      button-card-box-shadow: var(--ha-shadow-dark)
      button-card-box-shadow-active: var(--ha-shadow-dark)

      ha-dialog-background: rgba(0,0,0,0.35)
      ha-dialog-surface-background: rgba(0,0,0,0.35)

      ha-color-border-neutral-normal: transparent
      ha-color-fill-primary-normal-resting: var(--hemma-nav-bg)
      ha-color-fill-primary-quiet-resting: rgba(100,100,100,0.25)
      wa-color-text-quiet: var(--secondary-text-color)

      mdc-text-field-fill-color: var(--primary-background-color)
      mdc-select-fill-color: var(--primary-background-color)
      mdc-theme-surface: var(--ha-card-background)
      md-list-container-color: var(--ha-card-background)
      dialog-background-color: var(--ha-card-background)

  # ============================================================================
  # SHADOWS
  # ============================================================================

  ha-shadow-light: >
    inset 3px 3px 0.5px -3.5px rgba(255,255,255,0.1),
    inset -2px -2px 0.5px -2px rgba(255,255,255,0.1),
    inset 0 10px 18px -16px rgba(255,255,255,0.3),
    inset 0 -10px 18px -16px rgba(255,255,255,0.3),
    0 8px 20px rgba(0,0,0,0.06)

  ha-shadow-light-hover: >
    inset 3px 3px 0.5px -3.5px rgba(255,255,255,0.1),
    inset -2px -2px 0.5px -2px rgba(255,255,255,0.1),
    inset 0 10px 18px -16px rgba(255,255,255,0.2),
    inset 0 -10px 18px -16px rgba(255,255,255,0.2),
    0 8px 22px rgba(0,0,0,0.10)

  ha-shadow-dark: >
    inset 3px 3px 0.5px -3.5px rgba(120,120,120,0.3),
    inset -3px -3px 0.5px -3.5px rgba(120,120,120,0.3),
    inset 0 10px 18px -16px rgba(255,255,255,0.16),
    inset 0 -10px 18px -16px rgba(255,255,255,0.16),
    0 8px 20px rgba(0,0,0,0.04)

  ha-shadow-dark-hover: >
    inset 3px 3px 0.5px -3.5px rgba(120,120,120,0.3),
    inset -3px -3px 0.5px -3.5px rgba(120,120,120,0.3),
    inset 0 10px 18px -16px rgba(255,255,255,0.16),
    inset 0 -10px 18px -16px rgba(255,255,255,0.16),
    0 18px 20px rgba(0,0,0,0.10)

  ha-card-box-shadow-light: >
    inset 0 0 0 0.5px rgba(255,255,255,0.15),
    inset 3px 3px 0.5px -3.5px rgba(255,255,255,0.1),
    inset -2px -2px 0.5px -2px rgba(255,255,255,0.1),
    inset 0 10px 18px -16px rgba(255,255,255,0.2),
    inset 0 -10px 18px -16px rgba(255,255,255,0.2)

  ha-card-box-shadow-dark: >
    inset 0 0 0 1px rgba(255,255,255,0.12),
    inset 3px 3px 0.5px -3.5px rgba(120,120,120,0.1),
    inset -3px -3px 0.5px -3.5px rgba(120,120,120,0.1),
    inset 0 10px 18px -16px rgba(255,255,255,0.2),
    inset 0 -10px 18px -16px rgba(255,255,255,0.16)

  # ============================================================================
  # TYPOGRAPHY
  # ============================================================================

  primary-font-family: "Hanken Grotesk"
  ha-font-family-body: var(--primary-font-family)
  ha-card-header-font-family: var(--primary-font-family)

  # ============================================================================
  # CORE COLORS
  # ============================================================================

  primary-color: "#6ebaff"
  accent-color: "#6ebaff"
  divider-color: transparent
  app-theme-color: rgb(0,0,0)
  state-inactive-color: "#bdbdbd"
  primary-text-color: "#ffffff"
  icon-primary-color: var(--sidebar-icon-color)
  scrollbar-thumb-color: rgba(255,255,255,0.15)
  lumo-body-text-color: var(--primary-text-color)
  clear-background-color: var(--ha-card-background)
  paper-item-icon-color: white
  rgb-card-background-color: rgb(10,10,10)

  ha-color-on-primary-normal: var(--primary-color)
  ha-color-on-neutral-normal: var(--primary-text-color)
  ha-color-red-40: "#d6314a"
  ha-color-primary-95: "#9c9c9c"
  ha-color-neutral-90: transparent

  # ============================================================================
  # SIDEBAR
  # ============================================================================

  sidebar-selected-background-color: var(--primary-background-color)
  sidebar-selected-icon-color: var(--primary-text-color)
  sidebar-selected-text-color: var(--sidebar-selected-icon-color)

  # ============================================================================
  # WEB AWESOME / HA SYSTEM TOKENS
  # ============================================================================

  # Web Awesome
  wa-color-neutral-fill-normal: "#ffffff14"
  wa-color-surface-border: rgba(255,255,255,0.1)
  wa-color-neutral-fill-quiet: var(--primary-color)
  wa-color-neutral-border-loud: var(--hemma-nav-border)
  wa-color-neutral-border-normal: var(--hemma-nav-border)
  wa-color-neutral-border-quiet: var(--hemma-nav-border)
  wa-color-neutral-on-loud: rgba(255,255,255,0.95)
  wa-color-neutral-on-normal: rgba(255,255,255,0.95)
  wa-color-fill-loud: var(--primary-text-color)
  wa-color-neutral-fill-loud: var(--primary-text-color)
  wa-color-on-normal: var(--primary-text-color)
  wa-color-on-quiet: var(--primary-text-color)
  wa-color-neutral-on-quiet: var(--primary-text-color)
  wa-color-text-normal: var(--primary-text-color)

  # HA / MDC system
  ha-border-radius-lg: 12px
  ha-border-radius-sm: 30px
  ha-color-form-background: var(--ha-card-background)
  ha-card-features-border-radius: 30px
  border-end-end-radius: 30px
  wa-border-radius-m: 24px
  wa-border-radius-s: 30px
  wa-border-style: none
  wa-shadow-m: var(--ha-card-box-shadow)

  mdc-dialog-scrim-color: rgba(0,0,0,0.5)
  mdc-button-outline-color: rgba(255,255,255,0.15)
  mdc-theme-primary: rgb(100,180,255)
  mdc-shape-small: 30px

  # ============================================================================
  # DIALOGS / CARDS / APP CHROME
  # ============================================================================

  # App Header
  app-header-background-color: rgba(76,80,84,0.3)
  app-header-backdrop-filter: blur(10px)
  app-header-edit-background-color: rgba(0,0,0,0.2)
  app-header-border-bottom: none

  # Dialogs
  ha-dialog-surface-backdrop-filter: blur(15px) saturate(1.2)
  ha-dialog-surface-background: var(--ha-dialog-background)
  ha-dialog-scrim-backdrop-filter: none
  ha-dialog-border-radius: 28px
  dialog-box-shadow: var(--ha-card-box-shadow)

  # Cards
  card-background-color: var(--secondary-background-color)
  paper-listbox-background-color: var(--primary-background-color)
  ha-card-header-color: var(--primary-text-color)
  paper-card-background-color: var(--ha-card-background)
  ha-card-backdrop-filter: blur(20px) saturate(1.2)
  ha-card-border-color: transparent
  ha-card-border-radius: 28px
  ha-card-border-width: 0
  stack-card-gap: 0px
  horizontal-stack-card-gap: 10px

  # ============================================================================
  # FORM / INPUT TOKENS
  # ============================================================================

  input-fill-color: rgba(255,255,255,0.06)
  input-ink-color: rgba(255,255,255,0.8)
  input-label-ink-color: rgba(255,255,255,0.6)
  input-idle-line-color: rgba(255,255,255,0.12)
  input-hover-line-color: rgba(100,180,255,0.5)
  input-disabled-fill-color: rgba(255,255,255,0.03)
  input-disabled-ink-color: rgba(255,255,255,0.37)
  input-dropdown-icon-color: rgba(255,255,255,0.54)

  # ============================================================================
  # CODE / EDITOR TOKENS
  # ============================================================================

  # CodeMirror Syntax Highlighting
  codemirror-keyword: rgb(180,130,255)
  codemirror-number: rgb(100,200,130)
  codemirror-string: rgb(255,200,100)
  codemirror-comment: rgba(255,255,255,0.3)
  codemirror-atom: rgb(100,180,255)
  codemirror-property: rgb(255,140,100)

  # Code Editor
  code-editor-background-color: "#161616"

  # ============================================================================
  # NAVIGATION
  # ============================================================================

  # Navigation sizing / spacing
  hemma-nav-height: 26px
  hemma-nav-margin-desktop: 8vw
  hemma-nav-margin-tablet: 4.3vw
  hemma-nav-gap-desktop: 50px
  hemma-nav-gap-tablet: 45px
  hemma-nav-top-desktop: 60px
  hemma-nav-top-tablet: 55px
  hemma-nav-backdrop-filter: blur(8px) saturate(1.2)

  # Navigation popup styling
  hemma-popup-br: 25px
  hemma-popup-blur: blur(20px) saturate(1.1)
  hemma-popup-shadow: "0 8px 32px rgba(0,0,0,0.16), 0 2px 8px rgba(0,0,0,0.12)"

  # ============================================================================
  # HERO / HEADER LAYOUT
  # ============================================================================

  # Page gutters
  page-gutter-desktop: 8vw
  page-gutter-tablet: 4vw
  page-gutter-mobile: 11px

  # Header top
  header-top-desktop: clamp(300px, 36vh, 400px)
  header-top-tablet: clamp(140px, 30vh, 320px)
  header-top-tablet-portrait: clamp(260px, 28vh, 400px)
  header-top-mobile: clamp(30px, 16vh, 70px)
  header-top-mobile-nudge: -10px

  # Header height
  hemma-header-cap-desktop: clamp(260px, 30vh, 380px)
  hemma-header-cap-tablet: clamp(230px, 28vh, 340px)
  hemma-header-cap-mobile: clamp(240px, 34vh, 360px)
  hemma-header-cap-landscape: clamp(170px, 44vh, 240px)

  # Header adjustments
  hemma-header-temp-nudge: 3px
  hemma-header-badge-nudge: -4px

  # ============================================================================
  # HERO TYPOGRAPHY / TEMPERATURE
  # ============================================================================

  # Temperature formatting
  hero-header-gap-desktop: 8px
  hero-header-gap-tablet: 8px
  hero-header-gap-mobile: 8px
  hero-temp-font-size-desktop: 18px
  hero-temp-font-size-tablet: 16px
  hero-temp-font-size-mobile: 14px

  # Hero title sizing
  hero-title-size-desktop: clamp(75px, 4.6vw + 8px, 105px)
  hero-title-size-tablet: clamp(68px, 5.5vw + 8px, 90px)
  hero-title-size-mobile: clamp(38px, 4vw + 2px, 64px)
  hero-title-size-landscape: clamp(28px, 4.6vw + 4px, 40px)

  hero-title-line-height-desktop: 1.18
  hero-title-line-height-tablet: 1.18
  hero-title-line-height-mobile: 1.1
  hero-title-line-height-landscape: 1.10

  hero-title-letter-spacing-desktop: -2px
  hero-title-letter-spacing-tablet: -1.5px
  hero-title-letter-spacing-mobile: -1.2px
  hero-title-letter-spacing-landscape: -1px

  hero-title-margin-left-desktop: -2px
  hero-title-margin-left-tablet: 2px
  hero-title-margin-left-mobile: 2px
  hero-title-margin-left-landscape: 2px

  # ============================================================================
  # HERO IMAGE TREATMENT
  # ============================================================================

  hero-tint: rgba(55,55,55,0.50)
  hero-img-blur: 4px
  hero-img-scale: 1.08
  hero-img-saturate: 1.02
  hero-img-brightness: 0.985
  hero-img-saturate-from: 1.0
  hero-img-brightness-from: 0.97

  # ============================================================================
  # WEATHER
  # ============================================================================

  weather-icon-size-mobile: 26px
  weather-icon-size-tablet: 24px
  weather-icon-size-desktop: 24px
  hemma-weather-bottom-nudge: -5px

  # ============================================================================
  # ENTITY CARD LAYOUT
  # ============================================================================

  # Desktop
  hemma-entity-height-desktop: 200px
  hemma-entity-inner-pad-desktop: 20px
  hemma-entity-name-font-desktop: 18px
  hemma-entity-state-font-desktop: 15px
  hemma-entity-icon-size-desktop: 34px
  hemma-entity-rows-desktop: repeat(1, auto)
  hemma-entity-col-width-desktop: 290px
  hemma-entity-justify-desktop: start
  hemma-entity-right-inset-desktop: 0px
  hemma-entity-bottom-desktop: 20px
  hemma-entity-shadow-pad-right-desktop: 0px
  hemma-entity-overflow-y-desktop: hidden

  # Tablet
  hemma-entity-col-width-tablet: 220px
  hemma-entity-height-tablet: 160px
  hemma-entity-inner-pad-tablet: 18px
  hemma-entity-name-font-tablet: 16px
  hemma-entity-state-font-tablet: 15px
  hemma-entity-icon-size-tablet: 28px
  hemma-time-nudge-tablet: 36px
  hemma-entity-overflow-y-tablet: hidden

  # Mobile Portrait
  hemma-entity-col-width-mobile: 180px
  hemma-entity-height-mobile: 115px
  hemma-entity-inner-pad-mobile: 14px
  hemma-entity-name-font-mobile: 14px
  hemma-entity-state-font-mobile: 14px
  hemma-time-nudge-mobile: 8px
  hemma-entity-icon-size-mobile: 26px

  # Mobile Landscape
  hemma-entity-col-width-landscape: 160px
  hemma-entity-height-landscape: 120px
  hemma-entity-inner-pad-landscape: 14px
  hemma-entity-name-font-landscape: 13px
  hemma-entity-state-font-landscape: 12px
  hemma-entity-icon-size-landscape: 24px
  hemma-tiles-top-landscape-nudge: 0px
  hemma-hero-top-landscape-nudge: 16px

  # ============================================================================
  # ENTITY VISUAL TOKENS
  # ============================================================================

  hemma-entity-picture-inactive-opacity: 0.75
  hemma-entity-picture-active-opacity: 1
  hemma-entity-picture-inactive-filter: brightness(0.75) saturate(0.9)
  hemma-entity-picture-active-filter: none
  hemma-entity-text-shadow: 0 0 3px rgba(0,0,0,0.15)
  hemma-entity-header-buffer: 220px

  # ============================================================================
  # BADGE TOKENS
  # ============================================================================

  # Global
  badge-background: rgba(0,0,0,0.35)
  badge-title-inactive: rgba(255,255,255,0.75)
  badge-blur: 14px
  badge-br: 9999px
  badge-active-color: rgba(255,255,255,0.85)

  # Desktop
  badge-gap: 10px
  badge-col-gap: 4px
  badge-padding: 4px 15px 4px 9px
  badge-min-height: 50px
  badge-icon-size: 30px
  badge-font-size: 15px
  badge-btn-size: 22px

  # Tablet
  badge-gap-tablet: 10px
  badge-col-gap-tablet: 4px
  badge-padding-tablet: 3px 14px 3px 8px
  badge-min-height-tablet: 50px
  badge-icon-size-tablet: 30px
  badge-font-size-tablet: 15px
  badge-btn-size-tablet: 20px

  # Mobile
  badge-gap-mobile: 10px
  badge-col-gap-mobile: 4px
  badge-padding-mobile: 4px 12px 4px 5px
  badge-min-height-mobile: 43px
  badge-icon-size-mobile: 24px
  badge-font-size-mobile: 13px
  badge-btn-size-mobile: 18px

  # Mobile Landscape
  badge-gap-landscape: 10px
  badge-col-gap-landscape: 4px
  badge-padding-landscape: 4px 12px 4px 5px
  badge-min-height-landscape: 38px
  badge-icon-size-landscape: 24px
  badge-font-size-landscape: 12px
  badge-btn-size-landscape: 16px

  # Media badges
  badge-media-icon-size: 38px
  badge-media-icon-size-tablet: 36px
  badge-media-icon-size-mobile: 33px
  badge-media-icon-size-landscape: 28px

  badge-media-btn-size: 40px
  badge-media-btn-size-tablet: 40px
  badge-media-btn-size-mobile: 34px
  badge-media-btn-size-landscape: 30px

  badge-media-btn-icon-size: 28px
  badge-media-btn-icon-size-tablet: 24px
  badge-media-btn-icon-size-mobile: 20px
  badge-media-btn-icon-size-landscape: 18px

  badge-media-max-width-desktop: 640px
  badge-media-max-width-tablet: 520px
  badge-media-max-width-mobile: 100%

  # ============================================================================
  # HEMMA SEMANTIC COLORS
  # ============================================================================

  hemma-state-active-color: rgba(255,221,55,0.98)
  hemma-badge-light-color: '#ffd700'
  hemma-badge-climate-color: '#45dced'
  hemma-badge-climate-very-cold-color: '#11c2f7'
  hemma-badge-temp-very-cold-color: '#67d4f5'
  hemma-badge-temp-cool-color: '#a3daff'
  hemma-badge-temp-comfortable-color: '#67f5a0'
  hemma-badge-temp-warm-color: '#f5c842'
  hemma-badge-temp-hot-color: '#f5962a'
  hemma-badge-temp-very-hot-color: '#e53552'
  hemma-badge-air-quality-good-color: '#44e371'
  hemma-badge-air-quality-moderate-color: '#f0c741'
  hemma-badge-humidity-dry-color: '#ffb254'
  hemma-badge-humidity-high-color: '#4bd1fa'
  hemma-badge-presence-home-color: '#83fcb4'
  hemma-badge-presence-away-color: '#ffd900'
  hemma-badge-media-color: '#fc6874'

  # ============================================================================
  # ENTITY STATE COLORS
  # ============================================================================

  state-icon-active-color: rgb(100,180,255)
  state-icon-color: rgba(255,255,255,0.4)
  state-on-color: rgb(100,180,255)
  state-off-color: rgba(255,255,255,0.3)
  state-light-on-color: rgb(255,210,100)
  state-light-off-color: rgba(255,255,255,0.3)
  state-climate-heat-color: rgb(255,140,60)
  state-climate-cool-color: rgb(100,180,255)
  state-climate-auto-color: rgb(100,200,130)
  state-climate-idle-color: rgba(255,255,255,0.3)
  state-alarm-armed-color: rgb(100,200,130)
  state-alarm-disarmed-color: rgba(255,255,255,0.3)
  state-alarm-pending-color: rgb(255,180,60)
  state-alarm-triggered-color: rgb(255,80,80)
  state-lock-locked-color: rgb(100,200,130)
  state-lock-unlocked-color: rgb(255,100,100)
  state-binary_sensor-active-color: rgb(255,180,60)
  state-binary_sensor-inactive-color: rgba(255,255,255,0.3)
  state-sensor-battery-high-color: rgb(100,200,130)
  state-sensor-battery-low-color: rgb(255,80,80)
  state-media_player-active-color: rgb(100,180,255)
  state-media_player-inactive-color: rgba(255,255,255,0.3)
  state-vacuum-active-color: rgb(100,180,255)
  state-vacuum-inactive-color: rgba(255,255,255,0.3)

  # ============================================================================
  # COMPONENT COLORS
  # ============================================================================

  # Sliders
  paper-slider-knob-color: rgb(100,180,255)
  paper-slider-knob-start-color: var(--paper-slider-knob-color)
  paper-slider-pin-color: var(--paper-slider-knob-color)
  paper-slider-active-color: rgb(100,180,255)
  paper-slider-secondary-color: var(--paper-slider-knob-color)
  paper-slider-container-color: rgba(255,255,255,0.12)
  paper-slider-font-color: "#000000"
  ha-slider-background: none

  # Labels / badges
  label-badge-background-color: "#23232e"
  label-badge-text-color: "#f1f1f1"
  label-badge-red: rgb(255,80,80)
  label-badge-green: rgb(100,200,130)
  label-badge-blue: rgb(100,180,255)
  label-badge-yellow: rgb(255,200,60)

  # Chips
  chip-background-color: rgba(255,255,255,0.08)
  chip-text-color: rgba(255,255,255,0.75)

  # Switches
  switch-checked-color: rgb(100,180,255)
  switch-checked-button-color: white
  switch-checked-track-color: rgba(100,180,255,0.45)
  switch-unchecked-color: rgba(255,255,255,0.25)
  switch-unchecked-button-color: rgba(255,255,255,0.6)
  switch-unchecked-track-color: rgba(255,255,255,0.12)

  # Tables / markdown / history
  table-row-background-color: rgba(255,255,255,0.03)
  table-row-alternative-background-color: rgba(255,255,255,0.06)
  data-table-background-color: transparent
  markdown-code-background-color: rgba(255,255,255,0.08)
  trace-line-color: rgb(100,180,255)
  history-filling-color: rgba(100,180,255,0.15)

  # Energy dashboard
  energy-grid-consumption-color: rgb(100,180,255)
  energy-grid-return-color: rgb(100,200,130)
  energy-solar-color: rgb(255,200,60)
  energy-battery-in-color: rgb(180,130,255)
  energy-battery-out-color: rgb(255,140,60)
  energy-gas-color: rgb(255,120,100)

  # ============================================================================
  # CARD-MOD GLOBAL STYLES
  # ============================================================================

  card-mod-theme: "Hemma"

  card-mod-root-yaml: |
    .: |
      html, body,
      #view, hui-view {
        overflow-x: hidden !important;
        max-width: 100vw !important;
      }

      @media (max-width: 767px) and (orientation: portrait) {
        html, body {
          overflow: hidden !important;
          height: 100% !important;
          width: 100% !important;
          position: fixed !important;
          overscroll-behavior: none !important;
        }

        home-assistant,
        home-assistant-main,
        ha-panel-lovelace,
        hui-root {
          overflow: hidden !important;
          height: 100svh !important;
          max-height: 100svh !important;
          overscroll-behavior: none !important;
        }

        ha-panel-lovelace,
        hui-root,
        ha-app-layout,
        #view,
        hui-view,
        hui-view-container {
          touch-action: pan-y !important;
        }
      }

      :host, ha-app-layout {
        --hemma-header-offset: var(--app-header-height, var(--header-height, 0px));
        color-scheme: dark;
      }

      body.kiosk-mode,
      ha-panel-lovelace.kiosk-mode,
      ha-panel-lovelace[is-kiosk],
      ha-app-layout.kiosk-mode,
      ha-app-layout[is-kiosk]{
        --hemma-header-offset: 0px !important;
      }

      :not(.edit-mode) > hui-view::after,
      :not(.edit-mode) > hui-view:after {
        display: none !important;
      }

      ha-card.navbar-card.desktop.bottom.docked.type-custom-navbar-card{
        display: none !important;
        height: 0 !important;
        min-height: 0 !important;
        padding: 0 !important;
        margin: 0 !important;
        border: 0 !important;
        box-shadow: none !important;
        overflow: hidden !important;
      }

      ha-more-info-dialog,
      ha-dialog {
        --vertical-align-dialog: flex-end;
        --dialog-surface-margin-top: 15vh;
      }

      ha-more-info-dialog .mdc-dialog,
      ha-dialog .mdc-dialog {
        align-items: center !important;
        justify-content: center !important;
      }

      ha-more-info-dialog .mdc-dialog__container,
      ha-dialog .mdc-dialog__container {
        align-items: center !important;
        justify-content: center !important;
        margin-top: 10vh !important;
      }

      ha-more-info-dialog .mdc-dialog__surface,
      ha-dialog .mdc-dialog__surface {
        margin-top: auto !important;
        margin-bottom: auto !important;
      }

      @media (max-width: 767px) {
        ha-more-info-dialog .mdc-dialog__container,
        ha-dialog .mdc-dialog__container {
          align-items: flex-end !important;
          justify-content: flex-end !important;
          margin-top: 0 !important;
        }

        ha-more-info-dialog .mdc-dialog__surface,
        ha-dialog .mdc-dialog__surface {
          margin-top: auto !important;
          margin-bottom: 0 !important;
        }
      }

      layout-card{
        --layout-margin: 0px !important;
        --layout-padding: 0px !important;
        --layout-height: auto !important;
        --layout-overflow: visible !important;
        --ha-card-backdrop-filter: none;
        --ha-card-background: transparent;
        --ha-card-box-shadow: none;
        --ha-card-border-color: transparent;
        --ha-card-border-width: 0px;
      }

      navbar-card{
        --ha-card-backdrop-filter: none;
        --ha-card-background: transparent;
        --ha-card-box-shadow: none;
        --ha-card-border-color: transparent;
        --ha-card-border-width: 0px;
      }

      grid-layout {
        --masonry-view-card-margin: 0px;
      }

      layout-card$ #container{
        height: auto !important;
        min-height: 0 !important;
        align-items: flex-start !important;
        justify-content: flex-start !important;
      }

      layout-card$ #container > *{
        min-height: 0 !important;
      }

      ha-dropdown {
        --wa-color-surface-raised: var(--ha-card-background) !important;
      }

      ha-dropdown::part(menu) {
        backdrop-filter: blur(20px) saturate(1.02) !important;
        -webkit-backdrop-filter: blur(20px) saturate(1.02) !important;
      }

      .mdc-data-table {
        border-radius: 0px !important;
      }

      /* Desktop */
      html,
      :host,
      ha-app-layout {
        --page-gutter: var(--page-gutter-desktop);
        --hemma-rail-left: var(--page-gutter-desktop);
        --content-rail: var(--hemma-rail-left);
        --hero-top: var(--header-top-desktop);
        --hero-gutter: var(--page-gutter-desktop);
        --hero-header-gap-current: var(--hero-header-gap-desktop, 6px);
        --hero-temp-font-size: var(--hero-temp-font-size-desktop, 18px);
        --hemma-header-stack-h-current: var(--hemma-header-cap-desktop, clamp(260px, 30vh, 380px));
        --hemma-nav-margin-current: var(--hemma-nav-margin-desktop, 8vw);
        --hemma-nav-gap-current: var(--hemma-nav-gap-desktop, 50px);
        --hemma-nav-top-current: var(--hemma-nav-top-desktop, 60px);
        --hero-room-name-size-current: var(--hero-title-size-desktop, clamp(52px, 4.6vw + 8px, 96px));
        --hero-room-name-line-height-current: var(--hero-title-line-height-desktop, 1.18);
        --hero-room-name-letter-spacing-current: var(--hero-title-letter-spacing-desktop, -2px);
        --hero-room-name-margin-left-current: var(--hero-title-margin-left-desktop, -2px);
        --badge-media-max-width-current: var(--badge-media-max-width-desktop, 640px);
        --badge-gap-current: var(--badge-gap, 10px);
        --badge-col-gap-current: var(--badge-col-gap, 10px);
        --badge-padding-current: var(--badge-padding, 4px 15px 4px 9px);
        --badge-min-height-current: var(--badge-min-height, 52px);
        --badge-icon-size-current: var(--badge-icon-size, 30px);
        --badge-font-size-current: var(--badge-font-size, 16px);
        --badge-btn-size-current: var(--badge-btn-size, 22px);
        --badge-media-icon-size-current: var(--badge-media-icon-size, 44px);
        --badge-media-btn-size-current: var(--badge-media-btn-size, 44px);
        --badge-media-btn-icon-size-current: var(--badge-media-btn-icon-size, 28px);
        --hemma-entity-col-width-current: var(--hemma-entity-col-width-desktop, 280px);
        --hemma-entity-height-current: var(--hemma-entity-height-desktop, 180px);
        --hemma-entity-rows-current: var(--hemma-entity-rows-desktop, repeat(1, auto));
        --hemma-entity-justify-current: var(--hemma-entity-justify-desktop, flex-start);
        --hemma-entity-right-inset-current: var(--hemma-entity-right-inset-desktop, 0px);
        --hemma-entity-left-inset-current: var(--hemma-rail-left, var(--page-gutter, 8vw));
        --hemma-entity-bottom-current: var(--hemma-entity-bottom-desktop, 20px);
        --hemma-entity-shadow-pad-right-current: var(--hemma-entity-shadow-pad-right-desktop, 0px);
        --hemma-entity-overflow-y-current: var(--hemma-entity-overflow-y-desktop, hidden);
        --hemma-entity-inner-pad-current: var(--hemma-entity-inner-pad-desktop, 24px);
        --hemma-entity-name-font-current: var(--hemma-entity-name-font-desktop, 18px);
        --hemma-entity-state-font-current: var(--hemma-entity-state-font-desktop, 15px);
        --hemma-entity-icon-size-current: var(--hemma-entity-icon-size-desktop, 34px);
      }

      /* Tablet */
      @media (min-width: 768px) and (max-width: 1366px) and (min-height: 501px) and (hover: none) and (pointer: coarse) {
        html,
        :host,
        ha-app-layout {
          --page-gutter: var(--page-gutter-tablet);
          --hemma-rail-left: var(--page-gutter-tablet);
          --content-rail: var(--hemma-rail-left);
          --hero-top: var(--header-top-tablet);
          --hero-gutter: var(--page-gutter-tablet);
          --hero-header-gap-current: var(--hero-header-gap-tablet, 6px);
          --hero-temp-font-size: var(--hero-temp-font-size-tablet, 16px);
          --hemma-header-stack-h-current: var(--hemma-header-cap-tablet, clamp(230px, 28vh, 340px));
          --hemma-nav-margin-current: var(--hemma-nav-margin-tablet, 4vw);
          --hemma-nav-gap-current: var(--hemma-nav-gap-tablet, 34px);
          --hemma-nav-top-current: var(--hemma-nav-top-tablet, 46px);
          --hero-room-name-size-current: var(--hero-title-size-tablet, clamp(36px, 4.2vw + 6px, 64px));
          --hero-room-name-line-height-current: var(--hero-title-line-height-tablet, 1.18);
          --hero-room-name-letter-spacing-current: var(--hero-title-letter-spacing-tablet, -1.5px);
          --hero-room-name-margin-left-current: var(--hero-title-margin-left-tablet, -1px);
          --badge-media-max-width-current: var(--badge-media-max-width-tablet, 520px);
          --badge-gap-current: var(--badge-gap-tablet, var(--badge-gap, 10px));
          --badge-col-gap-current: var(--badge-col-gap-tablet, var(--badge-col-gap, 10px));
          --badge-padding-current: var(--badge-padding-tablet, var(--badge-padding, 4px 15px 4px 9px));
          --badge-min-height-current: var(--badge-min-height-tablet, var(--badge-min-height, 52px));
          --badge-icon-size-current: var(--badge-icon-size-tablet, var(--badge-icon-size, 30px));
          --badge-font-size-current: var(--badge-font-size-tablet, var(--badge-font-size, 16px));
          --badge-btn-size-current: var(--badge-btn-size-tablet, var(--badge-btn-size, 22px));
          --badge-media-icon-size-current: var(--badge-media-icon-size-tablet, var(--badge-media-icon-size, 38px));
          --badge-media-btn-size-current: var(--badge-media-btn-size-tablet, var(--badge-media-btn-size, 40px));
          --badge-media-btn-icon-size-current: var(--badge-media-btn-icon-size-tablet, var(--badge-media-btn-icon-size, 24px));
          --hemma-entity-col-width-current: var(--hemma-entity-col-width-tablet, 210px);
          --hemma-entity-height-current: var(--hemma-entity-height-tablet, 150px);
          --hemma-entity-overflow-y-current: var(--hemma-entity-overflow-y-tablet, var(--hemma-entity-overflow-y-desktop, hidden));
          --hemma-entity-inner-pad-current: var(--hemma-entity-inner-pad-tablet, 18px);
          --hemma-entity-name-font-current: var(--hemma-entity-name-font-tablet, 15px);
          --hemma-entity-state-font-current: var(--hemma-entity-state-font-tablet, 13px);
          --hemma-entity-icon-size-current: var(--hemma-entity-icon-size-tablet, 28px);
        }
      }

      /* Tablet Portrait */
      @media (min-width: 768px) and (max-width: 1366px) and (orientation: portrait) and (min-height: 501px) and (hover: none) and (pointer: coarse) {
        html,
        :host,
        ha-app-layout {
          --hero-top: var(--header-top-tablet-portrait);
        }
      }

      /* Mobile Portrait */
      @media (max-width: 767px) and (orientation: portrait) {
        html,
        :host,
        ha-app-layout {
          --page-gutter: var(--page-gutter-mobile);
          --hemma-rail-left: var(--page-gutter-mobile);
          --content-rail: var(--hemma-rail-left);
          --hero-top: calc(var(--header-top-mobile) - var(--header-top-mobile-nudge, 0px));
          --hero-gutter: var(--page-gutter-mobile);
          --hero-header-gap-current: var(--hero-header-gap-mobile, 5px);
          --hero-temp-font-size: var(--hero-temp-font-size-mobile, 14px);
          --hemma-header-stack-h-current: var(--hemma-header-cap-mobile, clamp(240px, 34vh, 360px));
          --hero-room-name-size-current: var(--hero-title-size-mobile, clamp(38px, 9vw + 2px, 64px));
          --hero-room-name-line-height-current: var(--hero-title-line-height-mobile, 1.20);
          --hero-room-name-letter-spacing-current: var(--hero-title-letter-spacing-mobile, -1.2px);
          --hero-room-name-margin-left-current: var(--hero-title-margin-left-mobile, 2px);
          --badge-media-max-width-current: var(--badge-media-max-width-mobile, 100%);
          --badge-gap-current: var(--badge-gap-mobile, var(--badge-gap, 10px));
          --badge-col-gap-current: var(--badge-col-gap-mobile, var(--badge-col-gap, 10px));
          --badge-padding-current: var(--badge-padding-mobile, var(--badge-padding, 4px 10px 4px 7px));
          --badge-min-height-current: var(--badge-min-height-mobile, var(--badge-min-height, 52px));
          --badge-icon-size-current: var(--badge-icon-size-mobile, var(--badge-icon-size, 30px));
          --badge-font-size-current: var(--badge-font-size-mobile, var(--badge-font-size, 16px));
          --badge-btn-size-current: var(--badge-btn-size-mobile, var(--badge-btn-size, 22px));
          --badge-media-icon-size-current: var(--badge-media-icon-size-mobile, var(--badge-media-icon-size, 32px));
          --badge-media-btn-size-current: var(--badge-media-btn-size-mobile, var(--badge-media-btn-size, 34px));
          --badge-media-btn-icon-size-current: var(--badge-media-btn-icon-size-mobile, var(--badge-media-btn-icon-size, 20px));
          --hemma-entity-col-width-current: var(--hemma-entity-col-width-mobile, 180px);
          --hemma-entity-height-current: var(--hemma-entity-height-mobile, 115px);
          --hemma-entity-inner-pad-current: var(--hemma-entity-inner-pad-mobile, 14px);
          --hemma-entity-name-font-current: var(--hemma-entity-name-font-mobile, 14px);
          --hemma-entity-state-font-current: var(--hemma-entity-state-font-mobile, 14px);
          --hemma-entity-icon-size-current: var(--hemma-entity-icon-size-mobile, 26px);
        }

        app-header ha-menu-button,
        app-toolbar ha-menu-button{
          display: none !important;
        }
      }

      /* Mobile Landscape */
      @media (hover: none) and (pointer: coarse) and (orientation: landscape) and (max-height: 600px) {
        html,
        :host,
        ha-app-layout {
          --page-gutter: var(--page-gutter-mobile);
          --hemma-rail-left: var(--page-gutter-mobile);
          --content-rail: var(--hemma-rail-left);
          --hero-gutter: 18px;
          --hero-top: calc(env(safe-area-inset-top, 0px) + 96px + var(--hemma-hero-top-landscape-nudge, 0px));
          --hemma-tiles-top-landscape: calc(var(--hero-top) + var(--hemma-tiles-top-landscape-nudge, 0px));
          --hemma-entity-col-width-current: var(--hemma-entity-col-width-landscape, 200px);
          --hemma-entity-height-current: var(--hemma-entity-height-landscape, 110px);
          --hemma-entity-inner-pad-current: var(--hemma-entity-inner-pad-landscape, 14px);
          --hemma-entity-name-font-current: var(--hemma-entity-name-font-landscape, 13px);
          --hemma-entity-state-font-current: var(--hemma-entity-state-font-landscape, 12px);
          --hemma-entity-icon-size-current: var(--hemma-entity-icon-size-landscape, 24px);
          --hemma-landscape-left-rail: clamp(240px, 34vw, 320px);
          --hemma-landscape-badge-stop-pad: 12px;
          --badge-media-max-width-current: calc(var(--hemma-landscape-left-rail) - var(--hemma-landscape-badge-stop-pad));
          --hemma-header-stack-h-current: var(--hemma-header-cap-landscape, clamp(170px, 44vh, 240px));
          --hero-room-name-size-current: var(--hero-title-size-landscape, clamp(32px, 5.6vw + 6px, 46px));
          --hero-room-name-line-height-current: var(--hero-title-line-height-landscape, 1.12);
          --hero-room-name-letter-spacing-current: var(--hero-title-letter-spacing-landscape, -1px);
          --hero-room-name-margin-left-current: var(--hero-title-margin-left-landscape, var(--hero-room-name-margin-left-current, 0px));
          --badge-gap-current: var(--badge-gap-landscape, var(--badge-gap-mobile, var(--badge-gap, 10px)));
          --badge-col-gap-current: var(--badge-col-gap-landscape, var(--badge-col-gap-mobile, var(--badge-col-gap, 4px)));
          --badge-padding-current: var(--badge-padding-landscape, var(--badge-padding-mobile, var(--badge-padding, 1px 14px 1px 6px)));
          --badge-min-height-current: var(--badge-min-height-landscape, var(--badge-min-height-mobile, var(--badge-min-height, 43px)));
          --badge-icon-size-current: var(--badge-icon-size-landscape, var(--badge-icon-size-mobile, var(--badge-icon-size, 30px)));
          --badge-font-size-current: var(--badge-font-size-landscape, var(--badge-font-size-mobile, var(--badge-font-size, 13px)));
          --badge-btn-size-current: var(--badge-btn-size-landscape, var(--badge-btn-size-mobile, var(--badge-btn-size, 18px)));
          --badge-media-icon-size-current: var(--badge-media-icon-size-landscape, var(--badge-media-icon-size-mobile, var(--badge-media-icon-size, 28px)));
          --badge-media-btn-size-current: var(--badge-media-btn-size-landscape, var(--badge-media-btn-size-mobile, var(--badge-media-btn-size, 30px)));
          --badge-media-btn-icon-size-current: var(--badge-media-btn-icon-size-landscape, var(--badge-media-btn-icon-size-mobile, var(--badge-media-btn-icon-size, 18px)));
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .m__run, .eq .b { animation: none !important; }
      }

      .hemma-entities,
      .hemma-entities > div {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .hemma-entities::-webkit-scrollbar,
      .hemma-entities > div::-webkit-scrollbar {
        width: 0 !important;
        height: 0 !important;
        background: transparent !important;
      }

      app-header,
      app-toolbar {
        background: transparent;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      ha-card {
        transition: filter .2s ease, opacity .2s ease;
      }

      @media (min-width: 768px) and (max-width: 1249px) and (orientation: portrait) and (hover: none){
        :host, ha-app-layout{
          --hemma-entity-bottom-current: calc(env(safe-area-inset-bottom, 0px) + 14px);
          --hemma-time-opacity: 0.4;
        }
      }
      @media (min-width: 768px) and (max-width: 1249px) and (orientation: landscape) and (hover: none){
        :host, ha-app-layout{
          --hemma-entity-bottom-current: 12px;
          --hemma-time-opacity: 0.4;
        }
      }

