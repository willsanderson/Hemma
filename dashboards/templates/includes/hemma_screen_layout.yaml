grid-template-columns: 1fr
grid-column-gap: 0px
margin: 0
padding: 0
position: relative
min-height: 100svh

mediaquery:
  "(max-width: 767px) and (orientation: portrait), (max-height: 500px) and (orientation: portrait)":
    min-height: 0
    height: 100%
    align-self: stretch
    place-self: start stretch