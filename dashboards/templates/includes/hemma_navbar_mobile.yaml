# Mobile Navbar
# ============================================================================
# CUSTOMIZATION REQUIRED: This file contains separate navbar configurations
# for different screen sizes. You must update routes in all sections.
#
# By default, routes point to /dashboard-hemma/[view-name]. If your dashboard
# has a different URL, search for "routes:" in this file and update them.
#
# SECTIONS TO UPDATE:
#   1. Phone Portrait (line ~30) - Has Home + Rooms dropdown + Scenes
#   2. Phone Landscape (line ~380) - Has Home + Rooms dropdown + Scenes
#   3. Tablet Portrait (line ~720) - Has Home + Rooms dropdown + Scenes
#   4. Tablet Landscape (line ~1060) - Has individual room links + Scenes
#
# ROUTES TO CUSTOMIZE IN EACH SECTION:
#   - Home: /dashboard-hemma/home
#   - Living Room: /dashboard-hemma/living-room
#   - Kitchen: /dashboard-hemma/kitchen
#   - Bedroom: /dashboard-hemma/bedroom
#
# ----------------------------------------------------------------------------
# MOTION SENSOR BADGES
# ----------------------------------------------------------------------------
# Motion dots appear on room routes and in the Rooms popup when a sensor is
# triggered. Sensor entity IDs are configured in ONE place only:
#
#   packages/hemma_helpers.yaml  →  input_text section
#
#   input_text.hemma_motion_living_room   ← your living room binary_sensor
#   input_text.hemma_motion_bedroom       ← your bedroom binary_sensor
#   input_text.hemma_motion_kitchen       ← your kitchen binary_sensor
#
# Set the 'initial:' value for each helper to your sensor's entity ID.
# Leave blank ("") to disable the badge for that room.
# This file does not need to be edited for sensor changes.
#
# To disable all motion badges at runtime (no file edit needed):
#   Toggle input_boolean.hemma_motion_badges off in Home Assistant.
# ============================================================================

type: vertical-stack
cards:

  # Phone Portrait
  - type: conditional
    conditions:
      - condition: state
        entity: input_boolean.hemma_mobile_navigation
        state: "off"
      - condition: screen
        media_query: "(orientation: portrait) and (max-width: 767px)"

    card:
      type: custom:navbar-card

      desktop:
        min_width: 99999
        hidden: true
        show_labels: false

      mobile:
        mode: docked
        show_labels: true
        hidden: >
          [[[
            const mm = (q) => (window.matchMedia ? window.matchMedia(q).matches : false);
            const isTouch = mm('(pointer: coarse)') || mm('(hover: none)');
            return !isTouch;
          ]]]

      layout:
        auto_padding:
          enabled: false
          desktop_px: 0
          mobile_px: 0

      card_mod:
        style: |
          :host{ z-index: 2147483647 !important; }
          ha-card{
            --mdc-ripple-press-opacity: 0 !important;
            --mdc-ripple-hover-opacity: 0 !important;
            --mdc-ripple-focus-opacity: 0 !important;
            --mdc-ripple-color: transparent !important;
            --state-layer-opacity: 0 !important;
            --mdc-theme-on-surface: transparent !important;
            background: transparent !important;
            box-shadow: none !important;
            overflow: visible !important;
            padding: 0 !important;
          }

      styles: |
        .navbar-card.desktop{ display:none !important; }

        .navbar-card.mobile,
        ha-card.navbar-card.mobile{
          position: fixed !important;
          left: 50% !important;
          transform: translateX(-50%) !important;
          bottom: 22px !important;
          top: auto !important;
          width: min(280px, calc(100vw - 38px)) !important;
          max-width: 350px !important;
          padding: 4px !important;
          border-radius: 9999px !important;
          background: var(--hemma-nav-bg, rgba(255,255,255,0.10)) !important;
          -webkit-backdrop-filter: var(--hemma-nav-backdrop-filter, blur(10px) saturate(1.2)) !important;
          backdrop-filter: var(--hemma-nav-backdrop-filter, blur(10px) saturate(1.2)) !important;
          border: none !important;
          box-shadow: var(--hemma-nav-shadow, 0 22px 50px rgba(0,0,0,0.32)) !important;
          overflow: hidden !important;
          --navbar-primary-color: var(--hemma-nav-icon, rgba(255,255,255,.85)) !important;
          --navbar-active-color:  var(--hemma-nav-icon-active, rgba(255,255,255,1)) !important;
          --navbar-route-background: transparent !important;
          --navbar-route-active-background: transparent !important;
          --navbar-active-background: transparent !important;
          --navbar-route-active-color: inherit !important;
        }

        ha-card.navbar-card.mobile::before{
          content: "";
          position: absolute;
          inset: 0;
          pointer-events: none;
          border-radius: inherit;
          padding: 1.2px;
          box-sizing: border-box;
          background: linear-gradient(
            to bottom right,
            var(--hemma-nav-specular-start, rgba(255,255,255,0.55)) 0%,
            var(--hemma-nav-specular-mid, rgba(255,255,255,0.21)) 45%,
            var(--hemma-nav-specular-mid, rgba(255,255,255,0.21)) 55%,
            var(--hemma-nav-specular-end, rgba(255,255,255,0.46)) 100%
          );
          -webkit-mask:
            linear-gradient(#fff 0 0) content-box,
            linear-gradient(#fff 0 0);
          -webkit-mask-composite: xor;
          mask:
            linear-gradient(#fff 0 0) content-box,
            linear-gradient(#fff 0 0);
          mask-composite: exclude;
        }

        .navbar.mobile{
          display: flex !important;
          align-items: center !important;
          justify-content: space-between !important;
          width: 100% !important;
          gap: 0 !important;
          padding: 0 !important;
          margin: 0 !important;
          --navbar-route-icon-size: 28px !important;
        }

        .route{
          flex: 1 1 0 !important;
          min-width: 0 !important;
          height: 54px !important;
          border-radius: 9999px !important;
          padding: 1px !important;
          box-sizing: border-box !important;
          background: transparent !important;
          box-shadow: none !important;
          border: 0 !important;
          outline: 0 !important;
          overflow: hidden !important;
          margin: 0 !important;
          display: flex !important;
          flex-direction: column !important;
          align-items: center !important;
          justify-content: center !important;
          gap: 2px !important;
        }

        .route.active{
          background: var(--hemma-nav-active-fill, rgba(255,255,255,0.20)) !important;
          background-clip: content-box !important;
          box-shadow: none !important;
        }

        .button{
          width: 100% !important;
          height: auto !important;
          flex: 0 0 auto !important;
          display: flex !important;
          align-items: center !important;
          justify-content: center !important;
          background: transparent !important;
          border: 0 !important;
          box-shadow: none !important;
          margin: 0 !important;
          padding: 0 !important;
        }

        .navbar.mobile ha-icon{
          --mdc-icon-size: var(--navbar-route-icon-size) !important;
          width: var(--navbar-route-icon-size) !important;
          height: var(--navbar-route-icon-size) !important;
          display: inline-flex !important;
          align-items: center !important;
          justify-content: center !important;
          line-height: 1 !important;
          flex: 0 0 auto !important;
        }

        .icon, .image{
          margin: 0 !important;
          background: transparent !important;
          box-shadow: none !important;
        }

        .route.active .icon, .route.active .image,
        .icon.active, .image.active{
          opacity: 1 !important;
        }

        .route .label{
          display: block !important;
          flex: 0 0 auto !important;
          width: 100% !important;
          text-align: center !important;
          font-size: 11px !important;
          font-weight: 600 !important;
          line-height: 1 !important;
          white-space: nowrap !important;
          overflow: hidden !important;
          text-overflow: ellipsis !important;
          opacity: .78 !important;
          margin: 0 !important;
          padding: 0 !important;
        }
        .route.active .label{ opacity: 1 !important; }

        ha-ripple{ display:none !important; }
        .mdc-ripple-surface::before,
        .mdc-ripple-surface::after{
          content: none !important;
          display: none !important;
          opacity: 0 !important;
        }

        :host{
          --hemma-popup-edge: 12px;
        }

        .navbar-popup{
          background: var(--hemma-popup-bg) !important;
          -webkit-backdrop-filter: var(--hemma-popup-blur, blur(20px) saturate(1.1)) !important;
          backdrop-filter: var(--hemma-popup-blur, blur(20px) saturate(1.1)) !important;
          border-radius: var(--hemma-popup-br, 22px) !important;
          box-shadow: var(--hemma-popup-shadow, 0 3px 14px rgba(0,0,0,0.14), 0 1px 3px rgba(0,0,0,0.06)) !important;
          padding: 7px !important;
          width: max-content !important;
          max-width: calc(100vw - (var(--hemma-popup-edge) * 2)) !important;
          max-height: calc(100vh - 140px) !important;
          overflow-y: auto !important;
          overscroll-behavior: contain !important;
          box-sizing: border-box !important;
          display: flex !important;
          flex-direction: column-reverse !important;
          align-items: stretch !important;
          justify-content: flex-start !important;
          text-align: left !important;
          transform: none !important;
          transform-origin: bottom center !important;
          transition: all 0.2s cubic-bezier(.2,.8,.2,1) !important;

          --hemma-popup-icon-size: 18px;
          --hemma-popup-label-size: 15px;
          --hemma-popup-label-weight: 400;
          --hemma-popup-label-active-weight: 550;
          --hemma-popup-label-inactive-opacity: .92;
        }

        .navbar-popup::before{
          content: "";
          position: absolute;
          inset: 0;
          pointer-events: none;
          border-radius: inherit;
          padding: 1.2px;
          box-sizing: border-box;
          background: linear-gradient(
            to bottom right,
            var(--hemma-popup-specular-start, rgba(255,255,255,0.32)) 0%,
            var(--hemma-popup-specular-mid, rgba(255,255,255,0.26)) 45%,
            var(--hemma-popup-specular-mid, rgba(255,255,255,0.26)) 55%,
            var(--hemma-popup-specular-end, rgba(255,255,255,0.22)) 100%
          );
          -webkit-mask:
            linear-gradient(#fff 0 0) content-box,
            linear-gradient(#fff 0 0);
          -webkit-mask-composite: xor;
          mask:
            linear-gradient(#fff 0 0) content-box,
            linear-gradient(#fff 0 0);
          mask-composite: exclude;
        }

        .navbar-popup.open-up{
          margin-top: -8px !important;
          margin-bottom: 0 !important;
          transform: translateY(-100%) !important;
        }

        .navbar-popup.open-bottom{
          margin-top: 10px !important;
          transform: none !important;
        }

        .navbar-popup-backdrop.visible{
          opacity: 0 !important;
        }

        .navbar-popup.visible .popup-item{
          transition-delay: calc(var(--index) * 0.01s) !important;
        }

        .navbar-popup,
        .navbar-popup *{
          --mdc-theme-primary: rgba(255,255,255,0.97) !important;
          --mdc-theme-secondary: rgba(255,255,255,0.97) !important;
          --icon-primary-color: rgba(255,255,255,0.97) !important;
          --icon-secondary-color: rgba(255,255,255,0.97) !important;
        }

        .navbar-popup .popup-item{
          display: grid !important;
          grid-template-columns: var(--hemma-popup-icon-size) max-content !important; /* FIX */
          align-items: center !important;
          justify-items: start !important;
          column-gap: 9px !important;
          padding: 9px 15px 9px 12px !important;
          border-radius: 9999px !important;
          width: 100% !important;
          color: rgba(255,255,255,0.97) !important;
          box-sizing: border-box !important;
          text-align: left !important;
          background: transparent !important;
          position: relative !important;
          overflow: visible !important;
        }

        .navbar-popup .popup-item:hover{ background: rgba(255,255,255,0.06) !important; }
        .navbar-popup .popup-item:active{ background: rgba(255,255,255,0.10) !important; }

        .navbar-popup .button:hover,
        .navbar-popup .button:focus,
        .navbar-popup .button:active,
        .navbar-popup .button:hover::before,
        .navbar-popup .button:hover::after,
        .navbar-popup ha-icon:hover{
          background: transparent !important;
          box-shadow: none !important;
          --state-layer-opacity: 0 !important;
          --md-ripple-hover-opacity: 0 !important;
        }

        .navbar-popup .popup-item .button{ position: static !important; }

        .navbar-popup .badge{
          right: 8px !important;
          top: 8px !important;
          transform: none !important;
          left: auto !important;
          width: 5px !important;
          height: 5px !important;
          animation: hemma-badge-pulse 3s ease-in-out infinite !important;
        }

        .navbar-popup .popup-item ha-icon{
          width: var(--hemma-popup-icon-size) !important;
          height: var(--hemma-popup-icon-size) !important;
          --mdc-icon-size: var(--hemma-popup-icon-size) !important;
          display: inline-flex !important;
          align-items: center !important;
          justify-content: center !important;
          line-height: 1 !important;
          color: rgba(255,255,255,0.97) !important;
          opacity: var(--hemma-popup-label-inactive-opacity) !important;
        }

        .navbar-popup .popup-item .image,
        .navbar-popup .popup-item .image img,
        .navbar-popup .popup-item img.image{
          width: var(--hemma-popup-icon-size) !important;
          height: var(--hemma-popup-icon-size) !important;
          max-width: none !important;
          max-height: none !important;
          object-fit: contain !important;
          display: inline-flex !important;
          align-items: center !important;
          justify-content: center !important;
          flex: 0 0 auto !important;
          -webkit-touch-callout: none !important;
          -webkit-user-select: none !important;
          user-select: none !important;
          -webkit-user-drag: none !important;
          pointer-events: none !important;
        }

        .navbar-popup .popup-item .label{
          font-size: var(--hemma-popup-label-size) !important;
          font-weight: var(--hemma-popup-label-weight) !important;
          line-height: 1.4 !important;
          margin: 0 !important;
          padding: 0 !important;
          color: rgba(255,255,255,0.97) !important;
          opacity: var(--hemma-popup-label-inactive-opacity) !important;
        }

        .navbar-popup .popup-item.active ha-icon,
        .navbar-popup .popup-item.active .label{
          opacity: 1 !important;
        }

        .navbar-popup .popup-item.active .label{
          font-weight: var(--hemma-popup-label-active-weight) !important;
        }

        .navbar-card, .navbar-card *{ box-sizing: border-box !important; }

        .navbar-card img,
        .navbar-card .image,
        .navbar-card .image img{
          -webkit-touch-callout: none !important;
          -webkit-user-select: none !important;
          user-select: none !important;
          -webkit-user-drag: none !important;
          pointer-events: none !important;
        }

        .navbar-card .route,
        .navbar-card .button{
          -webkit-touch-callout: none !important;
          -webkit-user-select: none !important;
          user-select: none !important;
        }

        .navbar.mobile{
          --navbar-route-icon-size: 26px !important;
        }

        .navbar.mobile .image,
        .navbar.mobile .image img{
          width: var(--navbar-route-icon-size) !important;
          height: var(--navbar-route-icon-size) !important;
          max-width: none !important;
          max-height: none !important;
        }

        :host, :host *{
          -webkit-tap-highlight-color: transparent !important;
          --mdc-ripple-press-opacity: 0 !important;
          --mdc-ripple-hover-opacity: 0 !important;
          --mdc-ripple-focus-opacity: 0 !important;
          --mdc-ripple-color: transparent !important;
          --state-layer-opacity: 0 !important;
          --md-ripple-hover-opacity: 0 !important;
          --md-ripple-focus-opacity: 0 !important;
          --md-ripple-pressed-opacity: 0 !important;
          --md-ripple-color: transparent !important;
        }

        ha-ripple, mwc-ripple, md-ripple{
          display: none !important;
        }

        .mdc-ripple-surface,
        .mdc-ripple-surface::before,
        .mdc-ripple-surface::after{
          display: none !important;
          opacity: 0 !important;
          content: none !important;
        }

        @keyframes hemma-badge-pulse {
          0%, 100% { opacity: .9; transform: scale(1); }
          50%       { opacity: 0; transform: scale(0.85); }
        }

        .badge{
          width: 6px !important;
          height: 6px !important;
          border-radius: 999px !important;
          right: 7px !important;
          animation: hemma-badge-pulse 3s ease-in-out infinite !important;
        }

      # Buttons (Edit these)
      routes:
        # Home
        - url: /dashboard-hemma/home
          label: Home
          image: /local/hemma/icons/home.svg
          image_selected: /local/hemma/icons/home.svg
          icon: /local/hemma/icons/home.svg
          icon_selected: /local/hemma/icons/home.svg

        # Rooms (Dropdown Menu)
        - label: Rooms
          image: >
            [[[
              const p = window.location.pathname || '';
              if (p === '/dashboard-hemma/bedroom') return '/local/hemma/icons/bedroom.svg';
              if (p === '/dashboard-hemma/kitchen') return '/local/hemma/icons/kitchen.svg';
              if (p === '/dashboard-hemma/living-room') return '/local/hemma/icons/living-room.svg';
              return '/local/hemma/icons/living-room.svg';
            ]]]
          image_selected: >
            [[[
              const p = window.location.pathname || '';
              if (p === '/dashboard-hemma/bedroom') return '/local/hemma/icons/bedroom.svg';
              if (p === '/dashboard-hemma/kitchen') return '/local/hemma/icons/kitchen.svg';
              if (p === '/dashboard-hemma/living-room') return '/local/hemma/icons/living-room.svg';
              return '/local/hemma/icons/living-room.svg';
            ]]]
          tap_action:
            action: open-popup
          selected: >
            [[[
              const p = window.location.pathname;
              return p.startsWith('/dashboard-hemma/')
                && !['/dashboard-hemma/home','/dashboard-hemma/scenes'].includes(p);
            ]]]
          badge:
            show: >
              [[[
                const _sensors = ['input_text.hemma_motion_living_room','input_text.hemma_motion_bedroom','input_text.hemma_motion_kitchen']
                  .map(h => hass.states[h]?.state?.trim()).filter(Boolean);
                return hass.states['input_boolean.hemma_motion_badges']?.state === 'on'
                  && _sensors.some(id => hass.states[id]?.state === 'on');
              ]]]
            color: '#ffd700'
          popup:
            - label: Bedroom
              url: /dashboard-hemma/bedroom
              image: /local/hemma/icons/bedroom.svg
              badge:
                show: >
                  [[[
                    const _s = hass.states['input_text.hemma_motion_bedroom']?.state?.trim();
                    return hass.states['input_boolean.hemma_motion_badges']?.state === 'on'
                      && !!_s && hass.states[_s]?.state === 'on';
                  ]]]
                color: '#ffd700'
            - label: Kitchen
              url: /dashboard-hemma/kitchen
              image: /local/hemma/icons/kitchen.svg
            - label: Living Room
              url: /dashboard-hemma/living-room
              image: /local/hemma/icons/living-room.svg
              badge:
                show: >
                  [[[
                    const _s = hass.states['input_text.hemma_motion_living_room']?.state?.trim();
                    return hass.states['input_boolean.hemma_motion_badges']?.state === 'on'
                      && !!_s && hass.states[_s]?.state === 'on';
                  ]]]
                color: '#ffd700'

        # Scenes (Dropdown Menu)
        - label: Scenes
          image: /local/hemma/icons/scenes.svg
          image_selected: /local/hemma/icons/scenes.svg
          icon: /local/hemma/icons/scenes.svg
          icon_selected: /local/hemma/icons/scenes.svg
          tap_action:
            action: open-popup
          popup: |
            [[[
              const reg = hass.entities;

              const getRegEntry = (id) => {
                if (!reg) return null;
                if (Array.isArray(reg)) return reg.find(e => e?.entity_id === id) || null;
                return reg[id] || (reg.get ? reg.get(id) : null) || null;
              };

              const isHidden = (id) => {
                const e = getRegEntry(id);
                // Different HA versions expose slightly different fields
                return !!(e && (e.hidden || e.hidden_by || e.disabled || e.disabled_by));
              };

              const scenes = Object.values(hass.states || {})
                .filter(e => e?.entity_id?.startsWith('scene.'))
                .filter(s => !s.entity_id.startsWith('scene.hemma_restore_'))
                // Keep only scenes that are NOT hidden/disabled in HA
                .filter(s => !isHidden(s.entity_id))
                .slice()
                .sort((a,b) => (a.attributes?.friendly_name || a.entity_id)
                  .localeCompare(b.attributes?.friendly_name || b.entity_id));

              return scenes.map(s => ({
                label: s.attributes?.friendly_name || s.entity_id.replace('scene.',''),
                icon: s.attributes?.icon || 'mdi:layers',
                tap_action: {
                  action: 'call-service',
                  service: 'scene.turn_on',
                  service_data: { entity_id: s.entity_id }
                }
              }));
            ]]]

  # Phone Landscape
  - type: conditional
    conditions:
      - condition: state
        entity: input_boolean.hemma_mobile_navigation
        state: "off"
      - condition: screen
        media_query: "(orientation: landscape) and (max-width: 599px) and (pointer: coarse) and (hover: none)"

    card:
      type: custom:navbar-card

      desktop:
        min_width: 1
        hidden: false
        mode: floating
        position: top
        show_labels: true
        show_popup_label_backgrounds: false

      mobile:
        hidden: true

      layout:
        auto_padding:
          enabled: false
          desktop_px: 0
          mobile_px: 0

      card_mod:
        style: |
          :host{ z-index: 2147483647 !important; }
          ha-card{
            --mdc-ripple-press-opacity: 0 !important;
            --mdc-ripple-hover-opacity: 0 !important;
            --mdc-ripple-focus-opacity: 0 !important;
            --mdc-ripple-color: transparent !important;
            --state-layer-opacity: 0 !important;
            --mdc-theme-on-surface: transparent !important;
            background: transparent !important;
            box-shadow: none !important;
            overflow: visible !important;
            padding: 0 !important;
          }

      styles: |
        .navbar-card.mobile{ display:none !important; }

        ha-card.navbar-card.desktop{
          position: fixed !important;
          left: 50% !important;
          transform: translateX(-50%) !important;
          top: 18px !important;
          bottom: auto !important;
          width: fit-content !important;
          border-radius: 9999px !important;
          padding: 4px !important;
          background: var(--hemma-nav-bg, rgba(255,255,255,0.11)) !important;
          -webkit-backdrop-filter: blur(12px) !important;
          backdrop-filter: blur(12px) !important;
          border: none !important;
          box-shadow: var(--hemma-nav-shadow, 0 18px 36px rgba(0,0,0,.04)) !important;
          overflow: visible !important;
          --navbar-primary-color: var(--hemma-nav-icon, rgba(255,255,255,.78)) !important;
          --navbar-active-color: var(--hemma-nav-icon-active, rgba(255,255,255,1)) !important;
          --navbar-route-active-background: transparent !important;
          --navbar-route-active-color: inherit !important;
        }

        ha-card.navbar-card.desktop::before{
          content: "";
          position: absolute;
          inset: 0;
          pointer-events: none;
          border-radius: inherit;
          padding: 1.2px;
          box-sizing: border-box;
          background: linear-gradient(
            to bottom right,
            var(--hemma-nav-specular-start, rgba(255,255,255,0.55)) 0%,
            var(--hemma-nav-specular-mid, rgba(255,255,255,0.21)) 45%,
            var(--hemma-nav-specular-mid, rgba(255,255,255,0.21)) 55%,
            var(--hemma-nav-specular-end, rgba(255,255,255,0.46)) 100%
          );
          -webkit-mask:
            linear-gradient(#fff 0 0) content-box,
            linear-gradient(#fff 0 0);
          -webkit-mask-composite: xor;
          mask:
            linear-gradient(#fff 0 0) content-box,
            linear-gradient(#fff 0 0);
          mask-composite: exclude;
        }

