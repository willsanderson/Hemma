          --md-ripple-focus-opacity: 0 !important;
          --md-ripple-pressed-opacity: 0 !important;
          --md-ripple-color: transparent !important;
        }

        ha-ripple, mwc-ripple, md-ripple{
          display: none !important;
        }

        .mdc-ripple-surface,
