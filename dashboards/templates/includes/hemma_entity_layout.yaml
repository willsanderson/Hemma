# -------- Desktop / Tablet --------
position: absolute
z-index: 3
display: grid
grid-auto-flow: column
grid-auto-columns: var(--hemma-entity-col-width-current, var(--hemma-entity-col-width-desktop, 300px))
grid-template-rows: var(--hemma-entity-rows-current, var(--hemma-entity-rows-desktop, repeat(1, auto)))
justify-content: var(--hemma-entity-justify-current, var(--hemma-entity-justify-desktop, flex-start))
grid-column-gap: 8px
grid-row-gap: 8px
margin: 0
inset: >
  auto var(--hemma-entity-right-inset-current, var(--hemma-entity-right-inset-desktop, var(--hemma-rail-left, var(--page-gutter, 8vw))))
       var(--hemma-entity-bottom-current, var(--hemma-entity-bottom-desktop, 20px))
       var(--hemma-entity-left-inset-current, var(--hemma-entity-left-inset-desktop, var(--hemma-rail-left, var(--page-gutter, 8vw))))
padding: 20px var(--hemma-entity-shadow-pad-right-current, var(--hemma-entity-shadow-pad-right-desktop, 0px)) 40px 0
align-content: end
box-sizing: border-box
overflow-x: auto
overflow-y: var(--hemma-entity-overflow-y-current, var(--hemma-entity-overflow-y-desktop, hidden))
-webkit-overflow-scrolling: touch
scroll-snap-type: x proximity
overflow-anchor: none
direction: ltr
scrollbar-width: none
-ms-overflow-style: none

mediaquery:
# -------- Mobile Portrait --------
  "(max-width: 767px) and (orientation: portrait), (max-height: 500px) and (orientation: portrait)":
    position: relative
    z-index: 4
    inset: auto
    margin: >-
      calc(var(--hero-top) + var(--hemma-header-stack-h-current, 240px) + var(--hemma-entity-mobile-top-gap, -40px))
      0
      calc(env(safe-area-inset-bottom, 0px) + var(--hemma-entity-bottom-gap, 0px))
      0
    padding: >-
      0
      var(--hemma-rail-left, var(--page-gutter-mobile, 11px))
      calc(env(safe-area-inset-bottom, 0px) + var(--hemma-entity-bottom-gap, 0px))
      var(--hemma-rail-left, var(--page-gutter-mobile, 11px))
    max-width: none
    min-height: >-
      calc((3 * var(--hemma-entity-height-current, 115px)) + (2 * 8px))
    align-content: end
    box-sizing: border-box
    display: grid
    grid-auto-flow: row
    grid-template-columns: repeat(2, minmax(0, 1fr))
    grid-auto-rows: var(--hemma-entity-height-current, 115px)
    grid-column-gap: 8px
    grid-row-gap: 8px
    justify-content: stretch
    justify-items: stretch
    align-items: stretch
    overflow: visible
    -webkit-overflow-scrolling: auto
    overscroll-behavior-y: auto
    touch-action: auto
    overflow-anchor: none
    scrollbar-width: none
    -ms-overflow-style: none
    scroll-snap-type: none

  # -------- Mobile Landscape --------
  "(max-height: 600px) and (orientation: landscape)":
    position: absolute
    z-index: 4
    inset: >
      calc(var(--hemma-tiles-top-landscape, calc(env(safe-area-inset-top, 0px) + 105px)))
      var(--hemma-tiles-right-pad-landscape, 0px)
      auto
      auto
    width: calc((2 * var(--hemma-entity-col-width-landscape, 160px)) + 8px)
    margin: 0
    padding: 0
    box-sizing: border-box
    display: grid
    grid-auto-flow: row
    grid-template-columns: repeat(2, var(--hemma-entity-col-width-landscape, 160px))
    grid-auto-rows: min-content
    gap: 8px
    justify-items: stretch
    align-content: start
    align-items: start
    overflow: visible
    scroll-snap-type: none