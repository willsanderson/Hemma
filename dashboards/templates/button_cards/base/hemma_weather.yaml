# Weather Widget
# ============================================================================
# MODES:
#   hero_mode: false (default) — compact, right-aligned, used in the mobile
#              portrait 'weather' area
#   hero_mode: true            — large, left-aligned, used as the desktop/tablet
#              temperature widget (Home dashboard only)
#
# CONFIGURABLE VARIABLES:
#   weather_temp_sensor:    entity_id of current temp sensor override
# ============================================================================
hemma_weather:
  variables:
    show_icon: true
    weather_temp_sensor: ''
    hero_mode: false

  show_icon: true
  show_name: true
  show_label: true

  show_entity_picture: >
    [[[
      if (variables?.hero_mode) return false;
      if (variables?.show_icon === false) return false;

      const condRaw = String(entity?.state || '').toLowerCase();
      const knownStates = new Set([
        'sunny','clear-night','partlycloudy','cloudy','overcast',
        'rainy','pouring','snowy','snow','snowy-rainy','hail',
        'lightning','lightning-rainy','fog','windy','windy-variant','exceptional'
      ]);
      return knownStates.has(condRaw);
    ]]]

  tap_action:
    action: more-info

  triggers_update:
    - '[[[ return entity?.entity_id ]]]'
    - '[[[ return variables?.weather_temp_sensor ]]]'

  styles:
    card:
      - background: none
      - box-shadow: none
      - backdrop-filter: none
      - border: 0
      - padding: 0
      - margin: 0
      - width: max-content
      - max-width: 100%
      - overflow: visible
      - "--mdc-ripple-press-opacity": 0
      - "-webkit-tap-highlight-color": transparent
      - --weather-icon-size: |
          [[[
            const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
            const isTablet = !isMobile && window.matchMedia('(max-width: 1024px)').matches;
            if (isMobile) return 'var(--weather-icon-size-mobile, 26px)';
            if (isTablet) return 'var(--weather-icon-size-tablet, 34px)';
            return 'var(--weather-icon-size-desktop, 34px)';
          ]]]

    grid:
      - grid-template-areas: >
          [[[
            return variables.hero_mode ? '"n"' : '"n i" "l i"';
          ]]]
      - grid-template-columns: >
          [[[
            return variables.hero_mode ? 'max-content' : 'max-content max-content';
          ]]]
      - grid-template-rows: >
          [[[
            return variables.hero_mode ? 'min-content' : 'min-content min-content';
          ]]]
      - column-gap: |
          [[[
            const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
            return isMobile ? '7px' : '5px';
          ]]]
      - row-gap: 2px
      - justify-content: >
          [[[
            return variables.hero_mode ? 'start' : 'end';
          ]]]
      - justify-items: >
          [[[
            return variables.hero_mode ? 'start' : 'end';
          ]]]
      - align-items: start
      - overflow: visible
      - min-width: 0
      - margin-right: 0

    name:
      - justify-self: >
          [[[
            return variables.hero_mode ? 'start' : 'end';
          ]]]
      - text-align: >
          [[[
            return variables.hero_mode ? 'left' : 'right';
          ]]]
      - font-size: >
          [[[
            return variables.hero_mode
              ? 'var(--hero-weather-hero-temp-size, 28px)'
              : 'var(--hero-weather-title-size, 16px)';
          ]]]
      - font-weight: 600
      - letter-spacing: -0.2px
      - line-height: 1
      - white-space: nowrap
      - overflow: hidden
      - text-overflow: ellipsis
      - max-width: 100%
      - opacity: 0.95

    icon:
      - width: var(--weather-icon-size, 34px)
      - height: var(--weather-icon-size, 34px)
      - align-self: center

    img_cell:
      - width: var(--weather-icon-size, 34px)
      - overflow: visible
      - align-self: center
      - position: relative

    entity_picture:
      - grid-area: i
      - position: absolute
      - top: 50%
      - left: 50%
      - transform: translate(-50%, -50%)
      - width: auto
      - height: var(--weather-icon-size, 34px)
      - object-fit: contain
      - border-radius: 0

    label:
      - grid-area: l
      - justify-self: end
      - text-align: right
      - font-size: var(--hero-weather-sub-size, 12px)
      - font-weight: 500
      - line-height: 1.1
      - margin-top: -2px
      - white-space: nowrap
      - overflow: visible
      - text-overflow: ellipsis
      - max-width: 100%
      - opacity: 0.76

  name: >
    [[[
      let tempVal = null;

      const tempEid = variables.weather_temp_sensor;
      const w = entity;

      if (tempEid) {
        const tState = states[tempEid];
        if (tState && !['unknown','unavailable',''].includes(String(tState.state))) {
          const n = Number(tState.state);
          if (!Number.isNaN(n)) tempVal = Math.round(n);
        }
      }

      if (tempVal === null) {
        const n = Number(w?.attributes?.temperature);
        if (!Number.isNaN(n)) tempVal = Math.round(n);
      }

      if (variables?.hero_mode) {
        if (tempVal === null) return '';

        let iconHtml = '';
        if (variables?.show_icon !== false) {
          const condRaw = String(w?.state || '').toLowerCase();
          const svgMap = {
            'sunny':           'clear-day',
            'clear-night':     'clear-night',
            'partlycloudy':    'partly-cloudy-day',
            'cloudy':          'cloudy',
            'overcast':        'cloudy',
            'rainy':           'rain',
            'pouring':         'rain-heavy',
            'snowy':           'snow',
            'snow':            'snow',
            'snowy-rainy':     'eather-mixed',
            'hail':            'rain-heavy',
            'lightning':       'thunder',
            'lightning-rainy': 'lightning-rainy',
            'fog':             'fog',
            'windy':           'wind',
            'windy-variant':   'wind',
            'exceptional':     'weather-mixed'
          };
          const file = svgMap[condRaw];
          if (file) {
            iconHtml = `<img src="/local/hemma/weather/${file}.svg" style="width:auto;height:var(--weather-icon-size,34px);object-fit:contain;opacity:0.92;flex-shrink:0;" />`;
          }
        }

        return `<span style="display:inline-flex;align-items:center;gap:4px;">${tempVal}°${iconHtml}</span>`;
      }

      return (tempVal === null) ? '' : `${tempVal}°`;
    ]]]

  icon: >
    [[[
      if (variables?.show_icon === false) return 'mdi:blank';

      const w = entity;
      const condRaw = String(w?.state || '').toLowerCase();

      const iconMap = {
        'sunny': 'mdi:weather-sunny',
        'clear-night': 'mdi:weather-night',
        'partlycloudy': 'mdi:weather-partly-cloudy',
        'cloudy': 'mdi:weather-cloudy',
        'overcast': 'mdi:weather-cloudy',
        'rainy': 'mdi:weather-rainy',
        'pouring': 'mdi:weather-pouring',
        'snowy': 'mdi:weather-snowy',
        'snow': 'mdi:weather-snowy',
        'snowy-rainy': 'mdi:weather-snowy-rainy',
        'hail': 'mdi:weather-hail',
        'lightning': 'mdi:weather-lightning',
        'lightning-rainy': 'mdi:weather-lightning-rainy',
        'fog': 'mdi:weather-fog',
        'windy': 'mdi:weather-windy',
        'windy-variant': 'mdi:weather-windy-variant',
        'exceptional': 'mdi:alert-circle-outline'
      };

      return iconMap[condRaw] || w?.attributes?.icon || 'mdi:weather-partly-cloudy';
    ]]]

  entity_picture: >
    [[[
      if (variables?.hero_mode) return null;
      if (variables?.show_icon === false) return null;

      const condRaw = String(entity?.state || '').toLowerCase();

      const svgMap = {
        'sunny':           'clear-day',
        'clear-night':     'clear-night',
        'partlycloudy':    'partly-cloudy-day',
        'cloudy':          'cloudy',
        'overcast':        'cloudy',
        'rainy':           'rain',
        'pouring':         'rain-heavy',
        'snowy':           'snow',
        'snow':            'snow',
        'snowy-rainy':     'weather-mixed',
        'hail':            'rain-heavy',
        'lightning':       'thunder',
        'lightning-rainy': 'lightning-rainy',
        'fog':             'fog',
        'windy':           'wind',
        'windy-variant':   'wind',
        'exceptional':     'weather-mixed'
      };

      const file = svgMap[condRaw];
      if (!file) return null;

      return `/local/hemma/weather/${file}.svg`;
    ]]]

  label: >
    [[[
      if (variables?.hero_mode) return '';

      const condKey = String(entity?.state || '').toLowerCase().trim();
      if (!condKey || ['unknown', 'unavailable'].includes(condKey)) return '';

      if (hass?.localize) {
        const loc = hass.localize(`state.weather.${condKey}`);
        if (loc && !loc.includes(`state.weather.${condKey}`)) return loc;
      }

      const fallbackMap = {
        'partlycloudy':    'Partly Cloudy',
        'clear-night':     'Clear Night',
        'snowy-rainy':     'Snowy Rainy',
        'lightning-rainy': 'Lightning Rainy',
        'windy-variant':   'Windy Variant'
      };
      return fallbackMap[condKey]
        || condKey.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    ]]]

  extra_styles: >
    [[[
      let css = `
        :host ha-card,
        :host(:hover) ha-card,
        :host(:focus) ha-card,
        :host(:focus-within) ha-card,
        :host(:active) ha-card {
          background: transparent !important;
          background-color: transparent !important;
          box-shadow: none !important;
          border: 0 !important;
          filter: none !important;
          transform: none !important;
          opacity: 1 !important;
          --ha-card-box-shadow: none !important;
        }

        :host ha-card:hover,
        :host(:hover) ha-card:hover {
          box-shadow: none !important;
          --ha-card-box-shadow: none !important;
        }

        ha-ripple {
          display: none !important;
          opacity: 0 !important;
          visibility: hidden !important;
        }
      `;
      if (variables?.hero_mode) {
        css += '#icon { display: none !important; } #label { display: none !important; }';
      }
      return css;
    ]]]