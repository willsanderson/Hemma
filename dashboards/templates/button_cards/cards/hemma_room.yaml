    badges_media:
      card:
        # layout-card cannot eliminate phantom column-gaps for hidden badge slots because
        # the wrapper divs are always grid items even when the badge inside is display:none.
        # A flex button-card wrapper where each slot div has display:none when inactive
        # is the only reliable way to eliminate phantom gaps.
        type: custom:button-card
        show_icon: false
        show_name: false
        show_state: false
        show_label: false
        show_entity_picture: false
        tap_action:
          action: none
        hold_action:
          action: none

