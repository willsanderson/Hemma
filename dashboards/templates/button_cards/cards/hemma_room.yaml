  extra_styles: |
    #mp1, #mp2, #mp3, #mp4,
    #plex, #plex_2,
    #activity1, #activity2 {
      overflow: hidden;
    }

    #badges,
    #badges_climate,
    #badges_presence,
    #badges_media,
    #badges_lights {
      overflow-x: hidden !important;
      overflow-y: hidden !important;
      overscroll-behavior-x: contain !important;
      scrollbar-width: none !important;
      -ms-overflow-style: none !important;
    }

    #badges::-webkit-scrollbar,
    #badges_climate::-webkit-scrollbar,
    #badges_presence::-webkit-scrollbar,
    #badges_media::-webkit-scrollbar,
    #badges_lights::-webkit-scrollbar {
      display: none;
    }

    @media (max-width: 767px) and (orientation: portrait) {
      #badges,
      #badges_climate,
      #badges_presence,
      #badges_media,
      #badges_lights {
        overflow-x: auto !important;
        width: calc(100% + 2 * var(--hero-gutter) - var(--hemma-header-badge-nudge, 0px)) !important;
        max-width: none !important;
        margin-left: calc(-1 * var(--hero-gutter) + var(--hemma-header-badge-nudge, 0px)) !important;
        padding-left: var(--hero-gutter) !important;
        padding-right: var(--hero-gutter) !important;
        box-sizing: border-box !important;
      }

      #badges_media {
        padding-left: calc(var(--hero-gutter) + var(--hemma-header-media-badge-nudge-current, 0px)) !important;
      }
    }

    @media (hover: none) and (pointer: coarse) and (orientation: landscape) and (max-height: 600px) {
      #badges,
      #badges_climate,
      #badges_presence,
      #badges_media,
      #badges_lights {
        max-width: calc(100vw - (2 * var(--hemma-entity-col-width-landscape, 200px)) - 8px - var(--hemma-tiles-right-pad-landscape, 0px) - var(--hero-gutter, 18px) - var(--hemma-landscape-badge-stop-pad, 60px)) !important;
        overflow-x: auto !important;
        box-sizing: border-box !important;
      }
    }