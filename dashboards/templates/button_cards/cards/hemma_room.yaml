# Room
hemma_room:
  class: "hemma-room"
  template:
    - hemma_default
    - hemma_shared

  triggers_update:
    - '[[[ return variables.temp_sensor_1 ]]]'
    - '[[[ return variables.temp_sensor_2 ]]]'
    - '[[[ return variables.temp_sensor_3 ]]]'
    - '[[[ return variables.temp_sensor_4 ]]]'
    - '[[[ return variables.temp_sensor_5 ]]]'
    - '[[[ return variables.quality_sensor ]]]'
    - '[[[ return variables.humidity_sensor ]]]'
    - '[[[ return variables.presence_entity_1 ]]]'
    - '[[[ return variables.presence_entity_2 ]]]'
    - '[[[ return variables.presence_entity_3 ]]]'
    - '[[[ return variables.presence_entity_4 ]]]'
    - '[[[ return variables.media_player_1 ]]]'
    - '[[[ return variables.media_player_2 ]]]'
    - '[[[ return variables.media_player_3 ]]]'
    - '[[[ return variables.media_player_4 ]]]'
    - '[[[ return variables.media_player_5 ]]]'
    - '[[[ return variables.media_player_6 ]]]'
    - '[[[ return variables.media_player_7 ]]]'
    - '[[[ return variables.media_player_8 ]]]'
    - '[[[ return variables.media_player_9 ]]]'
    - '[[[ return variables.media_player_10 ]]]'
    - '[[[ return variables.light_entity_1 ]]]'
    - '[[[ return variables.light_entity_2 ]]]'
    - '[[[ return variables.light_entity_3 ]]]'
    - '[[[ return variables.light_entity_4 ]]]'
    - '[[[ return variables.light_entity_5 ]]]'
    - '[[[ return variables.light_entity_6 ]]]'
    - '[[[ return variables.light_entity_7 ]]]'
    - '[[[ return variables.light_entity_8 ]]]'
    - '[[[ return variables.light_entity_9 ]]]'
    - '[[[ return variables.light_entity_10 ]]]'
    - '[[[ return variables.image ]]]'
    - '[[[ return variables.image_night ]]]'
    - '[[[ return variables.image_position ]]]'
    - '[[[ return variables.mobile_background_entity || "sensor.hemma_mobile_dynamic_background" ]]]'
    - '[[[ return variables.show_weather ]]]'
    - '[[[ return variables.weather_entity ]]]'
    - '[[[ return variables.weather_temp_sensor ]]]'
    - '[[[ return variables.climate_entity_1 ]]]'
    - '[[[ return variables.climate_entity_2 ]]]'
    - '[[[ return variables.climate_entity_3 ]]]'
    - input_boolean.hemma_mobile_navigation
    - input_select.hemma_expanded_row

  variables:
    image:
    image_night:
    image_position:
    mobile_background: false
    mobile_background_entity: sensor.hemma_mobile_dynamic_background

    show_climate: false
    show_climate_inline: false  # true = show individual badges (temp/humidity/air quality) directly on the top row instead of the group badge
    climate_entity_1:
    climate_entity_2:
    climate_entity_3:

    temp_sensor_1:
    temp_sensor_2:
    temp_sensor_3:
    temp_sensor_4:
    temp_sensor_5:
    temp_unit: 'F'  # 'F' or 'C' — sets comfort-level thresholds on the temperature sub-badge

    humidity_sensor:

    quality_sensor:

    show_presence: false
    presence_entity_1:
    presence_entity_2:
    presence_entity_3:
    presence_entity_4:

    show_media: false
    pause_timeout_minutes: 5

    show_media_player_1: false
    media_player_1:

    show_media_player_2: false
    media_player_2:

    show_media_player_3: false
    media_player_3:

    show_media_player_4: false
    media_player_4:

    show_media_player_5: false
    media_player_5:

    show_media_player_6: false
    media_player_6:

    show_media_player_7: false
    media_player_7:

    show_media_player_8: false
    media_player_8:

    show_media_player_9: false
    media_player_9:

    show_media_player_10: false
    media_player_10:

    show_lights: false
    light_group_entity:
    light_entity_1:
    light_entity_2:
    light_entity_3:
    light_entity_4:
    light_entity_5:
    light_entity_6:
    light_entity_7:
    light_entity_8:
    light_entity_9:
    light_entity_10:

    show_weather: false
    weather_entity:
    weather_temp_sensor:

  tap_action: { action: none }
  hold_action: { action: none }
  double_tap_action: { action: none }

  styles:
    card:
      - height: 100svh
      - padding-top: >
          [[[
            const mm = (q) => (window.matchMedia ? window.matchMedia(q).matches : false);
            const isPhonePortrait =
              (mm('(pointer: coarse)') || mm('(hover: none)')) &&
              mm('(max-width: 767px)') &&
              mm('(orientation: portrait)');

            const base = 'var(--hero-top)';
            return isPhonePortrait ? `calc(${base} - 20px)` : base;
          ]]]
      - padding-left: var(--hero-gutter)
      - padding-right: var(--hero-gutter)
      - padding-bottom: >
          [[[
            const mm = (q) => (window.matchMedia ? window.matchMedia(q).matches : false);
            const isPhonePortrait =
              (mm('(pointer: coarse)') || mm('(hover: none)')) &&
              mm('(max-width: 767px)') &&
              mm('(orientation: portrait)');

            return isPhonePortrait
              ? `calc(var(--hemma-nav-height, 112px) + env(safe-area-inset-bottom, 0px) + var(--hemma-entity-mobile-gap-above-nav, 20px))`
              : `calc(130px + env(safe-area-inset-bottom))`;
          ]]]
      - box-shadow: none !important
      - transform: translateZ(0)
      - will-change: transform
      - --hero-img-scale: 1.08
      - --hero-img: >
          [[[ 
            const w = window?.innerWidth || 1024;
            const h = window?.innerHeight || 800;
            const isMobile = (w <= 767 || h <= 500);
            const isDark =
              typeof hass?.themes?.darkMode === 'boolean'
                ? hass.themes.darkMode
                : window.matchMedia('(prefers-color-scheme: dark)').matches;

            if (isMobile && (variables.mobile_background ?? false)) {
              const phaseEntity = variables.mobile_background_entity || 'sensor.hemma_mobile_dynamic_background';
              const phaseRaw = String(states[phaseEntity]?.state || 'day').toLowerCase();

              let phase = 'day';
              if (['morning', 'dawn'].includes(phaseRaw)) phase = 'morning';
              else if (['day', 'midday', 'afternoon', 'goldenhour'].includes(phaseRaw)) phase = 'day';
              else if (['night', 'sunset', 'evening'].includes(phaseRaw)) phase = 'night';

              return `url("/local/hemma/mobile/mobile-${phase}${isDark ? '-dark' : ''}.jpg")`;
            }

            const base = variables.image || 'default';
            const picked = isDark ? (variables.image_night || `${base}-night`) : base;
            return `url("/local/hemma/rooms/${picked}.jpg")`;
          ]]]
      - --hero-img-pos: >
          [[[
            return variables.image_position || 'center center';
          ]]]
      - --hemma-time-right: >
          [[[
            const w = window?.innerWidth || 1024;
            const h = window?.innerHeight || 800;
            const isSmallTablet = (w >= 600 && w < 768 && h > 500);
            const isTablet = (w >= 768 && w <= 1366 && h > 500);
            if (isSmallTablet) return 'calc(env(safe-area-inset-right, 0px) + 8px)';
            if (isTablet) return 'max(calc(var(--hero-gutter) - 20px), 4px)';
            return 'var(--hemma-nav-margin-current, 4vw)';
          ]]]
      - --hemma-time-reserve: >
          [[[
            const w = window?.innerWidth || 1024;
            const h = window?.innerHeight || 800;
            const isTablet = (w >= 768 && w <= 1366 && h > 500);
            return isTablet ? '140px' : '160px';
          ]]]
      - --hemma-room-nav: >
          [[[
            const k = variables.image || 'default';
            const prev = window._hemmaRoomNav;
            if (!prev || prev.key !== k) {
              window._hemmaRoomNav = { key: k };
              const isActive = eid => {
                if (!eid) return false;
                const s = hass.states[eid];
                if (!s) return false;
                const st = (s.state || '').toLowerCase();
                if (['playing','buffering','on'].includes(st)) return true;
                if (st === 'paused') {
                  const a = s.attributes || {};
                  const hasContent = !!(
                    String(a.media_title || '').trim() ||
                    String(a.media_artist || a.artist || a.media_album_artist || '').trim()
                  );
                  if (!hasContent) return false;
                  const timeout = Number(variables.pause_timeout_minutes ?? 5);
                  if (timeout <= 0) return true;
                  return ((new Date() - new Date(s.last_changed)) / 60000) <= timeout;
                }
                return false;
              };
              const mediaEids = [
                variables.show_media_player_1 && variables.media_player_1,
                variables.show_media_player_2 && variables.media_player_2,
                variables.show_media_player_3 && variables.media_player_3,
                variables.show_media_player_4 && variables.media_player_4,
                variables.show_media_player_5 && variables.media_player_5,
                variables.show_media_player_6 && variables.media_player_6,
                variables.show_media_player_7 && variables.media_player_7,
                variables.show_media_player_8 && variables.media_player_8,
                variables.show_media_player_9 && variables.media_player_9,
                variables.show_media_player_10 && variables.media_player_10,
                variables.show_plex_1 && variables.plex_binary_1,
                variables.show_plex_2 && variables.plex_binary_2,
                variables.show_psn_1 && variables.psn_1,
                variables.show_psn_2 && variables.psn_2,
              ].filter(Boolean);
              const _steamOnline = variables.show_discord_steam && variables.discord_steam_online && variables.discord_steam_game &&
                (hass.states[variables.discord_steam_online]?.state || '').toLowerCase() === 'online';
              const _steamGame = String(hass.states[variables.discord_steam_game]?.state || '').toLowerCase();
              const steamActive = _steamOnline && !!_steamGame && _steamGame !== 'unknown' && _steamGame !== 'unavailable';
              const opt = (mediaEids.some(isActive) || steamActive) ? 'media' : 'none';
              hass.callService('input_select', 'select_option', {
                entity_id: 'input_select.hemma_expanded_row',
                option: opt
              });
            }
            return k;
          ]]]

    name:
      - grid-area: n
      - color: var(--primary-text-color)
      - opacity: 0.9
      - font-size: var(--hero-room-name-size-current, clamp(48px, 6vw + 12px, 100px))
      - letter-spacing: var(--hero-room-name-letter-spacing-current, -2px)
      - font-weight: 700
      - justify-self: start
      - padding-left: 0
      - line-height: var(--hero-room-name-line-height-current, 1.2)
      - margin-left: var(--hero-room-name-margin-left-current, 0px)
      - overflow: visible

    grid: []  # Inherits from hemma_shared

    custom_fields:
      temperature:
        - grid-area: temperature
        - display: >
            [[[
              const w = window?.innerWidth || 1024;
              const h = window?.innerHeight || 800;
              const isMobileSize = w <= 767 || h <= 500;
              return (!isMobileSize && !!variables.show_weather) ? 'block' : 'none';
            ]]]
        - position: absolute
        - top: >
            calc(
              var(--hero-top)
              + var(--hero-temp-reserve, 22px)
              + var(--hero-header-gap-current, 6px)
              - var(--hero-weather-hero-height, 48px)
              + var(--hero-weather-hero-nudge, -12px))
        - left: >
            calc(
              var(--hero-gutter)
              + var(--hero-room-name-margin-left-current, 0px)
              + var(--hemma-header-temp-nudge, 0px))
        - z-index: 5
        - pointer-events: auto
        - cursor: pointer
        - overflow: visible
        - color: var(--primary-text-color)
        - background: transparent !important
        - background-color: transparent !important

      time:
        - position: fixed
        - top: >
            [[[
              const w = window?.innerWidth || 1024;
              const h = window?.innerHeight || 800;

              const isMobile = (w <= 767 || h <= 500);
              const isSmallTablet = (w >= 600 && w < 768 && h > 500);
              const isTablet = (w >= 768 && w <= 1366 && h > 500);

              const nudge =
                isSmallTablet ? 'var(--hemma-time-nudge-small-tablet, 43px)' :
                isMobile ? 'var(--hemma-time-nudge-mobile, 8px)' :
                isTablet ? 'var(--hemma-time-nudge-tablet, 36px)' :
                '0px';

              return `calc(env(safe-area-inset-top, 0px) + var(--hemma-nav-top-current, 46px) - ${nudge})`;
            ]]]
        - right: >
            [[[
              return `var(--hemma-time-right, var(--hemma-nav-margin-current, 4vw))`;
            ]]]
        - z-index: 10
        - pointer-events: auto
        - "--mdc-ripple-press-opacity": 0
        - "-webkit-tap-highlight-color": transparent
        - display: >
            [[[
              const navOpen = states['input_boolean.hemma_mobile_navigation']?.state === 'on';
              const mm = (q) => (window.matchMedia ? window.matchMedia(q).matches : false);
              const isTouch = mm('(pointer: coarse)') || mm('(hover: none)');
              const w = window?.innerWidth || 1024;
              const h = window?.innerHeight || 800;
              const isSmallTablet = (w >= 600 && w < 768 && h > 500);
              const isTablet = (w >= 768 && w <= 1366 && h > 500);
              // Small tablets (600-767px): always show — desktop nav requires 769px so nothing else shows the time here
              // Regular tablets (768-1366px): only show for touch — non-touch gets the time from the desktop nav bar
              return (!navOpen && (isSmallTablet || (isTablet && isTouch))) ? 'block' : 'none';
            ]]]

      weather:
        - grid-area: weather
        - display: >
            [[[
              const mm = (q) => (window.matchMedia ? window.matchMedia(q).matches : false);
              const isPhonePortrait =
                (mm('(pointer: coarse)') || mm('(hover: none)')) &&
                mm('(max-width: 767px)') &&
                mm('(orientation: portrait)');
              const hasData = !!(variables.weather_entity || variables.weather_temp_sensor);
              const ok = !!variables.show_weather && hasData;
              return (isPhonePortrait && ok) ? 'block' : 'none';
            ]]]
        - position: absolute
        - top: >
            calc(
              var(--hero-top)
              + var(--hero-room-name-size-current, 38px) * var(--hero-room-name-line-height-current, 1.1)
              - var(--hero-weather-title-size, 16px)
              - var(--hero-weather-sub-size, 13px) * 1.1
              - 1px
              + var(--hemma-weather-bottom-nudge, 0px))
        - left: var(--hero-gutter, var(--page-gutter-mobile, 11px))
        - right: calc(var(--hero-gutter, var(--page-gutter-mobile, 11px)) + 6px)
        - z-index: 10
        - text-align: right
        - justify-self: end
        - margin: 0
        - width: auto
        - max-width: none
        - overflow: visible
        - pointer-events: auto

      badges:
        - grid-area: badges
        - justify-self: start !important
        - align-self: start !important
        - place-self: start !important
        - text-align: left !important
        - margin-left: >
            calc(
              var(--hero-room-name-margin-left-current, 0px) +
              var(--hemma-header-badge-nudge, 0px))
        - margin-right: auto !important
        - width: max-content
        - max-width: 100%
        - margin-top: var(--hero-header-gap-current, 6px)
        - margin-bottom: 0
        - padding-left: 0
        - pointer-events: auto
        - height: auto !important
        - display: >
            [[[
              return (states['input_boolean.hemma_mobile_navigation']?.state === 'on')
                ? 'none'
                : 'block';
            ]]]

      badges_climate:
        - grid-area: badges_climate
        - justify-self: start !important
        - align-self: start !important
        - place-self: start !important
        - text-align: left !important
        - margin-left: >
            calc(
              var(--hero-room-name-margin-left-current, 0px) +
              var(--hemma-header-badge-nudge, 0px))
        - margin-right: auto !important
        - width: max-content
        - max-width: 100%
        - margin-top: >
            [[[
              if (!variables.show_climate || variables.show_climate_inline) return '0';
              if (states['input_boolean.hemma_mobile_navigation']?.state === 'on') return '0';
              return states['input_select.hemma_expanded_row']?.state === 'climate'
                ? 'var(--hero-header-gap-current, 6px)' : '0';
            ]]]
        - margin-bottom: 0
        - padding-left: 0
        - pointer-events: auto
        - height: auto !important
        - display: >
            [[[
              if (states['input_boolean.hemma_mobile_navigation']?.state === 'on') return 'none';
              if (!variables.show_climate || variables.show_climate_inline) return 'none';
              return 'block';
            ]]]
        - max-height: >
            [[[
              if (!variables.show_climate || variables.show_climate_inline) return '0';
              if (states['input_boolean.hemma_mobile_navigation']?.state === 'on') return '0';
              return states['input_select.hemma_expanded_row']?.state === 'climate' ? '200px' : '0';
            ]]]
        - overflow-x: auto
        - overflow-y: hidden
        - --hemma-row-fade: >
            [[[
              if (!variables.show_climate || variables.show_climate_inline) return 0;
              if (states['input_boolean.hemma_mobile_navigation']?.state === 'on') return 0;
              return states['input_select.hemma_expanded_row']?.state === 'climate' ? 1 : 0;
            ]]]
        - transition: >
            [[[
              const isExpanded = states['input_select.hemma_expanded_row']?.state === 'climate';
              if (isExpanded) return 'max-height 0s, margin-top 0s';
              const isSwitching = states['input_select.hemma_expanded_row']?.state !== 'none';
              return isSwitching
                ? 'max-height 0s, margin-top 0s'
                : 'max-height 0s 0.35s, margin-top 0s 0.35s';
            ]]]
        - pointer-events: >
            [[[
              return states['input_select.hemma_expanded_row']?.state === 'climate' ? 'auto' : 'none';
            ]]]

      badges_presence:
        - grid-area: badges_presence
        - justify-self: start !important
        - align-self: start !important
        - place-self: start !important
        - text-align: left !important
        - margin-left: >
            calc(
              var(--hero-room-name-margin-left-current, 0px) +
              var(--hemma-header-badge-nudge, 0px))
        - margin-right: auto !important
        - width: max-content
        - max-width: 100%
        - margin-top: >
            [[[
              if (!variables.show_presence) return '0';
              if (variables.presence_entity_1 && !variables.presence_entity_2) return '0';
              if (states['input_boolean.hemma_mobile_navigation']?.state === 'on') return '0';
              return states['input_select.hemma_expanded_row']?.state === 'presence'
                ? 'var(--hero-header-gap-current, 6px)' : '0';
            ]]]
        - margin-bottom: 0
        - padding-left: 0
        - height: auto !important
        - display: >
            [[[
              if (states['input_boolean.hemma_mobile_navigation']?.state === 'on') return 'none';
              if (!variables.show_presence) return 'none';
              if (variables.presence_entity_1 && !variables.presence_entity_2) return 'none';
              return 'block';
            ]]]
        - max-height: >
            [[[
              if (!variables.show_presence) return '0';
              if (variables.presence_entity_1 && !variables.presence_entity_2) return '0';
              if (states['input_boolean.hemma_mobile_navigation']?.state === 'on') return '0';
              return states['input_select.hemma_expanded_row']?.state === 'presence' ? '200px' : '0';
            ]]]
        - overflow-x: auto
        - overflow-y: hidden
        - --hemma-row-fade: >
            [[[
              if (!variables.show_presence) return 0;
              if (variables.presence_entity_1 && !variables.presence_entity_2) return 0;
              if (states['input_boolean.hemma_mobile_navigation']?.state === 'on') return 0;
              return states['input_select.hemma_expanded_row']?.state === 'presence' ? 1 : 0;
            ]]]
        - transition: >
            [[[
              const isExpanded = states['input_select.hemma_expanded_row']?.state === 'presence';
              if (isExpanded) return 'max-height 0s, margin-top 0s';
              const isSwitching = states['input_select.hemma_expanded_row']?.state !== 'none';
              return isSwitching
                ? 'max-height 0s, margin-top 0s'
                : 'max-height 0s 0.35s, margin-top 0s 0.35s';
            ]]]
        - pointer-events: >
            [[[
              return states['input_select.hemma_expanded_row']?.state === 'presence' ? 'auto' : 'none';
            ]]]

      badges_media:
        - grid-area: badges_media
        - justify-self: start !important
        - align-self: start !important
        - place-self: start !important
        - text-align: left !important
        - margin-top: >
            [[[
              if (!variables.show_media) return '0';
              if (states['input_boolean.hemma_mobile_navigation']?.state === 'on') return '0';
              return states['input_select.hemma_expanded_row']?.state === 'media'
                ? 'var(--hero-header-gap-current, 6px)' : '0';
            ]]]
        - margin-right: auto !important
        - margin-left: >
            calc(
              var(--hero-room-name-margin-left-current, 0px) +
              var(--hemma-header-badge-nudge, 0px) +
              var(--hemma-header-media-badge-nudge-current, 0px))
        - padding-left: 0
        - padding-top: 0px !important
        - padding-bottom: 0px !important
        - height: auto !important
        - opacity: var(--hemma-row-fade, 0)
        - min-height: 0 !important
        - width: max-content
        - max-width: 100%
        - display: >
            [[[
              if (states['input_boolean.hemma_mobile_navigation']?.state === 'on') return 'none';
              if (!variables.show_media) return 'none';
              return 'block';
            ]]]
        - max-height: >
            [[[
              if (!variables.show_media) return '0';
              if (states['input_boolean.hemma_mobile_navigation']?.state === 'on') return '0';
              return states['input_select.hemma_expanded_row']?.state === 'media' ? '500px' : '0';
            ]]]
        - overflow-x: auto
        - overflow-y: hidden
        - --hemma-row-fade: >
            [[[
              if (!variables.show_media) return 0;
              if (states['input_boolean.hemma_mobile_navigation']?.state === 'on') return 0;
              return states['input_select.hemma_expanded_row']?.state === 'media' ? 1 : 0;
            ]]]
        - transition: >
            [[[
              const isExpanded = states['input_select.hemma_expanded_row']?.state === 'media';

              if (isExpanded) {
                return 'max-height 0s, margin-top 0s, opacity 0s';
              }

              const isSwitching = states['input_select.hemma_expanded_row']?.state !== 'none';

              return isSwitching
                ? 'max-height 0s, margin-top 0s, opacity 0.22s ease'
                : 'max-height 0s 0.35s, margin-top 0s 0.35s, opacity 0.22s ease';
            ]]]
        - pointer-events: >
            [[[
              return states['input_select.hemma_expanded_row']?.state === 'media' ? 'auto' : 'none';
            ]]]

      badges_lights:
        - grid-area: badges_lights
        - justify-self: start !important
        - align-self: start !important
        - place-self: start !important
        - text-align: left !important
        - margin-left: >
            calc(
              var(--hero-room-name-margin-left-current, 0px) +
              var(--hemma-header-badge-nudge, 0px))
        - margin-right: auto !important
        - width: max-content
        - max-width: 100%
        - margin-top: >
            [[[
              if (!variables.show_lights) return '0';
              if (states['input_boolean.hemma_mobile_navigation']?.state === 'on') return '0';
              return states['input_select.hemma_expanded_row']?.state === 'lights'
                ? 'var(--hero-header-gap-current, 6px)' : '0';
            ]]]
        - margin-bottom: 0
        - padding-left: 0
        - pointer-events: auto
        - height: auto !important
        - display: >
            [[[
              if (states['input_boolean.hemma_mobile_navigation']?.state === 'on') return 'none';
              if (!variables.show_lights) return 'none';
              return 'block';
            ]]]
