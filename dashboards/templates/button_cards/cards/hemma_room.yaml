        margin-left: calc(-1 * var(--hero-gutter) + var(--hemma-header-badge-nudge, 0px)) !important;
        padding-left: var(--hero-gutter) !important;
        padding-right: var(--hero-gutter) !important;
        box-sizing: border-box !important;
      }
    }

    @media (hover: none) and (pointer: coarse) and (orientation: landscape) and (max-height: 600px) {
      #badges,
      #badges_climate,
      #badges_presence,
      #badges_media,
      #badges_lights {
        max-width: calc(100vw - (2 * var(--hemma-entity-col-width-landscape, 200px)) - 8px - var(--hemma-tiles-right-pad-landscape, 0px) - var(--hero-gutter, 18px) - var(--hemma-landscape-badge-stop-pad, 60px)) !important;
        overflow-x: auto !important;
        box-sizing: border-box !important;
      }

      #badges,
      #badges_climate,
      #badges_presence,
      #badges_lights {
        -webkit-mask-image: linear-gradient(to right,
          black calc(100vw - (2 * var(--hemma-entity-col-width-landscape, 200px)) - 8px - var(--hemma-tiles-right-pad-landscape, 0px) - var(--hero-gutter, 18px) - var(--hemma-landscape-badge-stop-pad, 60px) - 16px),
          transparent calc(100vw - (2 * var(--hemma-entity-col-width-landscape, 200px)) - 8px - var(--hemma-tiles-right-pad-landscape, 0px) - var(--hero-gutter, 18px) - var(--hemma-landscape-badge-stop-pad, 60px))
        ) !important;
        mask-image: linear-gradient(to right,
          black calc(100vw - (2 * var(--hemma-entity-col-width-landscape, 200px)) - 8px - var(--hemma-tiles-right-pad-landscape, 0px) - var(--hero-gutter, 18px) - var(--hemma-landscape-badge-stop-pad, 60px) - 16px),
          transparent calc(100vw - (2 * var(--hemma-entity-col-width-landscape, 200px)) - 8px - var(--hemma-tiles-right-pad-landscape, 0px) - var(--hero-gutter, 18px) - var(--hemma-landscape-badge-stop-pad, 60px))
        ) !important;
      }

      /* mask-image is intentionally excluded from #badges_media — applying mask-image to
         a parent creates a new compositing stacking context that breaks backdrop-filter
         on descendant media badge cards. Other badge containers keep the fade since
         their backdrop-filter blur is less visually prominent. */
      #badges_media {
        -webkit-mask-image: none !important;
        mask-image: none !important;
      }
    }
