          ha-card {
            will-change: auto !important;
            isolation: auto !important;
            contain: none !important;
          }
          #container {
            will-change: auto !important;
            isolation: auto !important;
          }

        styles:
          card:
            - background: transparent !important
            - box-shadow: none !important
            - backdrop-filter: none !important
            - -webkit-backdrop-filter: none !important
            - padding: 0 !important
            - margin-top: 3px !important
            - margin-left: 2px !important
            - border-radius: 0 !important
            - border: none !important
            - overflow: visible !important
            - width: max-content !important
          grid:
            - display: flex !important
            - flex-direction: row !important
            - flex-wrap: nowrap !important
            - gap: var(--badge-gap-current, var(--badge-gap, 10px)) !important
            - align-items: flex-start !important
            - justify-content: flex-start !important
            - overflow: visible !important
            - padding: 0 !important
            - margin: 0 !important
            - width: max-content !important
          custom_fields:
            mp1:
              - display: >
                  [[[
                    if (!variables.show_media_player_1 || !variables.media_player_1) return 'none';
                    const s = states[variables.media_player_1];
                    if (!s) return 'none';
                    const st = String(s.state || '');
                    if (['unavailable','unknown','off','standby'].includes(st)) return 'none';
                    const a = s.attributes || {};
                    const title  = String(a.media_title || '').trim();
                    const artist = String(a.media_artist || a.artist || a.media_album_artist || '').trim();
                    if (!title && !artist) return 'none';
                    if (st === 'paused') {
                      const t = Number(variables.pause_timeout_minutes ?? 5);
                      if (t > 0 && (new Date() - new Date(s.last_changed)) / 60000 > t) return 'none';
                    }
                    return 'block';
                  ]]]
            mp2:
              - display: >
                  [[[
                    if (!variables.show_media_player_2 || !variables.media_player_2) return 'none';
                    const s = states[variables.media_player_2];
                    if (!s) return 'none';
                    const st = String(s.state || '');
                    if (['unavailable','unknown','off','standby'].includes(st)) return 'none';
                    const a = s.attributes || {};
                    const title  = String(a.media_title || '').trim();
                    const artist = String(a.media_artist || a.artist || a.media_album_artist || '').trim();
                    if (!title && !artist) return 'none';
                    if (st === 'paused') {
                      const t = Number(variables.pause_timeout_minutes ?? 5);
                      if (t > 0 && (new Date() - new Date(s.last_changed)) / 60000 > t) return 'none';
                    }
                    return 'block';
                  ]]]
            mp3:
              - display: >
                  [[[
                    if (!variables.show_media_player_3 || !variables.media_player_3) return 'none';
                    const s = states[variables.media_player_3];
                    if (!s) return 'none';
                    const st = String(s.state || '');
                    if (['unavailable','unknown','off','standby'].includes(st)) return 'none';
                    const a = s.attributes || {};
                    const title  = String(a.media_title || '').trim();
                    const artist = String(a.media_artist || a.artist || a.media_album_artist || '').trim();
                    if (!title && !artist) return 'none';
                    if (st === 'paused') {
                      const t = Number(variables.pause_timeout_minutes ?? 5);
                      if (t > 0 && (new Date() - new Date(s.last_changed)) / 60000 > t) return 'none';
                    }
                    return 'block';
                  ]]]
            mp4:
              - display: >
                  [[[
                    if (!variables.show_media_player_4 || !variables.media_player_4) return 'none';
                    const s = states[variables.media_player_4];
                    if (!s) return 'none';
                    const st = String(s.state || '');
                    if (['unavailable','unknown','off','standby'].includes(st)) return 'none';
                    const a = s.attributes || {};
                    const title  = String(a.media_title || '').trim();
                    const artist = String(a.media_artist || a.artist || a.media_album_artist || '').trim();
                    if (!title && !artist) return 'none';
                    if (st === 'paused') {
                      const t = Number(variables.pause_timeout_minutes ?? 5);
                      if (t > 0 && (new Date() - new Date(s.last_changed)) / 60000 > t) return 'none';
                    }
                    return 'block';
                  ]]]
            plex:
              - display: >
                  [[[
                    if (!variables.show_media_plex || !variables.media_plex_binary) return 'none';
                    const s = states[variables.media_plex_binary];
                    return (s && s.state === 'on') ? 'block' : 'none';
                  ]]]
            activity1:
              - display: >
                  [[[
                    if (!variables.show_psn_1 || !variables.psn_1) return 'none';
                    const s = states[variables.psn_1];
                    if (!s) return 'none';
                    const st = String(s.state || '').toLowerCase();
                    const a  = s.attributes || {};
                    if (['playing','buffering','paused'].includes(st)) return 'block';
                    const title  = String(a.media_title || a.title || '').trim();
                    const artist = String(a.media_artist || a.artist || a.media_album_artist || '').trim();
                    const app    = String(a.app_name || a.source || '').trim();
                    return (title || artist || app) ? 'block' : 'none';
                  ]]]
            activity2:
              - display: >
                  [[[
                    if (!variables.show_psn_2 || !variables.psn_2) return 'none';
                    const s = states[variables.psn_2];
                    if (!s) return 'none';
                    const st = String(s.state || '').toLowerCase();
                    const a  = s.attributes || {};
                    if (['playing','buffering','paused'].includes(st)) return 'block';
                    const title  = String(a.media_title || a.title || '').trim();
                    const artist = String(a.media_artist || a.artist || a.media_album_artist || '').trim();
                    const app    = String(a.app_name || a.source || '').trim();
                    return (title || artist || app) ? 'block' : 'none';
                  ]]]

