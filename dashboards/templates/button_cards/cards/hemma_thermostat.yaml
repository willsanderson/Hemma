hemma_thermostat:
  template: [hemma_entity]
  show_entity_picture: false
  show_icon: false
  show_label: false
  name: Thermostat

  variables:
    thermostat_toggle_helper: input_boolean.hemma_thermostat_overlay
    temp_sensor:
    show_toggle: false

  state_display: |
    [[[
      const mode = entity.state;
      const target = entity.attributes.temperature;
      if (mode === 'cool') {
        return "Cooling to " + target + "°";
      } else if (mode === 'heat') {
        return "Heating to " + target + "°";
      } else {
        return "Off";
      }
    ]]]

  tap_action:
    action: call-service
    service: input_boolean.toggle
    service_data:
      entity_id: |
        [[[
          return variables.thermostat_toggle_helper;
        ]]]

  hold_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  custom_fields:
    temp_puck:
      card:
        type: custom:button-card
        entity: '[[[ return entity.entity_id ]]]'
        show_name: false
        show_icon: false
        show_state: false
        tap_action:
          action: more-info
        custom_fields:
          temp_display: |
            [[[
              let raw;
              const eid = variables.temp_sensor;
              if (eid && states[eid] && !["unknown","unavailable"].includes(states[eid].state)) {
                raw = states[eid].state;
              } else {
                raw = entity?.attributes?.current_temperature;
              }
              const n = Math.round(Number(raw));
              if (raw == null || Number.isNaN(n)) return '';
              return `${n}`;
            ]]]
        styles:
          card:
            - background: |
                [[[
                  const s = String(entity?.state || '').toLowerCase();
                  if (s === 'cool') return 'var(--hemma-puck-icon-color-active)';
                  if (s === 'heat') return 'var(--hemma-puck-icon-color-active)';
                  return 'var(--hemma-puck-icon-color)';
                ]]]
            - width: 100%
            - height: 100%
            - padding: var(--hemma-puck-padding, 8px)
            - border: none !important
            - opacity: 0.8
            - transition: opacity 0.2s ease, transform 0.15s ease, filter 0.2s ease
            - cursor: pointer
            - box-sizing: border-box
            - display: flex
            - align-items: center
            - justify-content: center
          name:
            - display: none
          custom_fields:
            temp_display:
              - display: flex
              - align-items: center
              - justify-content: center
              - width: 100%
              - height: 100%
              - position: relative
              - top: 1px
              - color: |
                  [[[
                    const s = String(entity?.state || '').toLowerCase();
                    const isActive = ["cool","heat"].includes(s);
                    const c = isActive
                      ? 'var(--hemma-puck-font-color-active, var(--secondary-text-color))'
                      : 'var(--hemma-puck-font-color, var(--secondary-text-color))';
                    return `color-mix(in srgb, ${c} 100%, transparent)`;
                  ]]]
              - font-weight: 800
              - line-height: 1
              - font-size: |
                  [[[
                    const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
                    return isMobile ? '14px' : '16px';
                  ]]]
        extra_styles: |
          ha-card {
            box-shadow: none !important;
          }
          @media (hover: hover) {
            :host ha-card:hover {
              opacity: 1 !important;
              filter: brightness(1.2);
              transform: scale(1.05);
              box-shadow: none !important;
            }
          }
          @media (hover: none) {
            :host ha-card:active {
              opacity: 1 !important;
              filter: brightness(1.2);
              transform: scale(1.05);
              box-shadow: none !important;
            }
          }

    cooling_modes:
      card:
        type: custom:button-card
        entity: '[[[ return entity.entity_id ]]]'
        show_name: false
        show_state: false
        show_icon: false
        tap_action:
          action: call-service
          service: climate.set_hvac_mode
          data:
            entity_id: '[[[ return entity.entity_id ]]]'
            hvac_mode: |
              [[[
                if (['cool','heat'].includes(entity.state)) return 'off';
                return states['input_select.hemma_thermostat_mode']?.state || 'cool';
              ]]]
        custom_fields:
          svg: |
            [[[
              const KF_ID = 'hemma-toggle-kf-v7';
              if (!document.getElementById(KF_ID)) {
                const s = document.createElement('style');
                s.id = KF_ID;
                s.textContent = [
                  '@keyframes hemma-thumb-on-d{from{transform:translateX(0)}to{transform:translateX(16px)}}',
                  '@keyframes hemma-thumb-off-d{from{transform:translateX(16px)}to{transform:translateX(0)}}',
                  '@keyframes hemma-thumb-on-m{from{transform:translateX(0)}to{transform:translateX(12px)}}',
                  '@keyframes hemma-thumb-off-m{from{transform:translateX(12px)}to{transform:translateX(0)}}'
                ].join('');
                document.head.appendChild(s);
              }
              const st = entity.state;
              const isOn = ['cool','heat'].includes(st);
              const mob = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
              const W = mob ? 34 : 40, H = mob ? 22 : 24, r = mob ? 7 : 7, cx0 = mob ? 12 : 13;
              const SW = W + 2;
              const travel = mob ? 12 : 16;
              const stateKey = '_hemma_toggle_' + entity.entity_id;
              const shouldAnimate = window[stateKey] !== undefined && window[stateKey] !== isOn;
              window[stateKey] = isOn;
              const anim = isOn ? (mob ? 'hemma-thumb-on-m' : 'hemma-thumb-on-d') : (mob ? 'hemma-thumb-off-m' : 'hemma-thumb-off-d');
              const animStyle = shouldAnimate ? `animation:${anim} 0.2s ease forwards;` : '';
              const circleCx = (!shouldAnimate && isOn) ? cx0 + travel : cx0;
              const mid = 'htm-' + entity.entity_id.replace(/[^a-z0-9]/gi, '-');
              if (isOn) {
                return `<svg width="${SW}" height="${H}" viewBox="0 0 ${SW} ${H}" style="display:block;overflow:visible;"><defs><mask id="${mid}"><rect x="2" y="1" width="${W-2}" height="${H-2}" rx="${(H-2)/2}" fill="white"/><circle cx="${circleCx}" cy="${H/2}" r="${r}" fill="black" style="${animStyle}"/></mask></defs><rect x="2" y="1" width="${W-2}" height="${H-2}" rx="${(H-2)/2}" fill="rgba(255,255,255,0.7)" mask="url(#${mid})"/></svg>`;
              } else {
                return `<svg width="${SW}" height="${H}" viewBox="0 0 ${SW} ${H}" style="display:block;overflow:visible;"><rect x="2" y="1" width="${W-2}" height="${H-2}" rx="${(H-2)/2}" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/><circle cx="${circleCx}" cy="${H/2}" r="${r}" fill="rgba(255,255,255,0.4)" style="${animStyle}"/></svg>`;
              }
            ]]]
        styles:
          card:
            - background: transparent !important
            - background-color: transparent !important
            - --ha-card-background: transparent
            - box-shadow: none !important
            - border: none !important
            - backdrop-filter: none !important
            - "-webkit-backdrop-filter": none !important
            - padding: 0 !important
            - overflow: visible !important
            - "--button-card-ripple-color": transparent !important
            - "-webkit-tap-highlight-color": transparent !important
            - border-radius: 0 !important
          grid:
            - padding: 0 !important
            - overflow: visible !important
          custom_fields:
            svg:
              - line-height: 0
        extra_styles: |
          :host {
            display: block !important;
            width: 42px !important;
            height: 24px !important;
            overflow: visible !important;
            cursor: pointer;
          }
          @media (max-width: 767px), (max-height: 600px) {
            :host { width: 36px !important; height: 22px !important; }
          }
          ha-card, #container {
            overflow: visible !important;
            background: transparent !important;
            --ha-card-background: transparent !important;
          }
          @media (hover: hover) {
            :host { transition: filter 0.2s ease; }
            :host(:hover) { filter: brightness(1.5) !important; }
          }

    target_temperature:
      card:
        type: custom:button-card
        template: [hemma_entity]
        entity: '[[[ return entity.entity_id ]]]'
        show_entity_picture: false
        show_icon: false
        name: Target Temp
        state_display: |
          [[[
            const raw = states['input_number.hemma_thermostat_target_temperature']?.state;
            const n = Math.round(Number(raw));
            if (raw == null || raw === 'unknown' || raw === 'unavailable' || Number.isNaN(n)) return '';
            return `${n}°`;
          ]]]
        tap_action:
          action: call-service
          service: input_boolean.toggle
          service_data:
            entity_id: |
              [[[
                return variables.thermostat_toggle_helper;
              ]]]

        extra_styles: |
          ha-card {
            box-shadow: none !important;
            border: none !important;
          }
          ha-card::before {
            display: none !important;
          }

        styles:
          card:
            - background: transparent !important
            - background-color: transparent !important
            - backdrop-filter: none !important
            - animation: none !important
            - box-shadow: none !important
            - border: none !important
            - padding-right: 0
          icon:
            - background: transparent !important
          img_cell:
            - background: transparent !important
          custom_fields:
            temperature_controls:
              - position: absolute
              - top: var(--hemma-entity-inner-pad-current, var(--hemma-entity-inner-pad-desktop, 22px))
              - right: |
                  [[[
                    const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
                    return isMobile ? '14px' : '22px';
                  ]]]
              - bottom: var(--hemma-entity-inner-pad-current, var(--hemma-entity-inner-pad-desktop, 22px))
              - width: var(--rail-w)
              - border-radius: |
                  [[[
                    const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
                    return isMobile ? '20px' : '24px';
                  ]]]
              - overflow: hidden
              - background: rgba(255,255,255,0.09)

        custom_fields:
          temperature_controls:
            card:
              type: custom:layout-card
              layout_type: custom:grid-layout
              layout:
                position: absolute
                inset: 0 0 0 auto
                width: var(--rail-w)
                grid-template-columns: 1fr
                grid-template-rows: repeat(3, 1fr)
                height: 100%
                margin: 0
                padding: 0
                align-items: stretch
                justify-items: stretch
              card_mod:
                style: |
                  ha-card {
                    background: transparent !important;
                    border: none !important;
                    box-shadow: none !important;
                  }
              cards:
                - type: custom:button-card
                  template: [hemma_default]
                  show_name: false
                  show_state: false
                  show_entity_picture: true
                  entity_picture: /local/hemma/icons/increase.svg
                  tap_action:
                    action: call-service
                    service: input_number.increment
                    service_data:
                      entity_id: input_number.hemma_thermostat_target_temperature
                  styles:
                    card:
                      - height: 100%
                      - min-height: 0
                      - padding: 0
                      - background: transparent
                      - box-shadow: none !important
                      - border: none !important
                      - backdrop-filter: none !important
                      - "--button-card-ripple-color": transparent !important
                      - "-webkit-tap-highlight-color": transparent !important
                    img_cell:
                      - width: |
                          [[[
                            const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
                            return isMobile ? '74%' : '78%';
                          ]]]
                      - aspect-ratio: '1'
                  extra_styles: |
                    ha-card { background: transparent !important; }
                    #container::before {
                      content: '';
                      position: absolute;
                      inset: 0;
                      background: radial-gradient(circle calc(var(--rail-w) / 2 - 5px) at center, rgba(255,255,255,0.07) 95%, transparent 96%);
                      opacity: 0;
                      pointer-events: none;
                      z-index: 0;
                    }
                    @media (hover: hover) {
                      :host(:hover) #container::before { opacity: 1; }
                    }
                    @media (hover: none) {
                      :host(:active) #container::before { opacity: 1; }
                    }

                - type: custom:button-card
                  template: [hemma_default]
                  show_state: false
                  name: SET
                  tap_action:
                    action: call-service
                    service: climate.set_temperature
                    service_data:
                      entity_id: '[[[ return entity.entity_id ]]]'
                      temperature: |
                        [[[
                          const st = states['input_number.hemma_thermostat_target_temperature'];
                          const n = parseFloat(st?.state);
                          return Number.isFinite(n) ? n : null;
                        ]]]
                  styles:
                    card:
                      - height: 100%
                      - min-height: 0
                      - padding: 0
                      - background: transparent
                      - box-shadow: none !important
                      - border: none !important
                      - backdrop-filter: none !important
                      - "--button-card-ripple-color": transparent !important
                      - "-webkit-tap-highlight-color": transparent !important
                    name:
                      - font-size: |
                          [[[
                            const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
                            return isMobile ? '10px' : '12px';
                          ]]]
                      - letter-spacing: 1px
                      - text-transform: uppercase
                      - font-weight: 600
                  extra_styles: |
                    ha-card { background: transparent !important; }
                    #container::before {
                      content: '';
                      position: absolute;
                      inset: 0;
                      background: radial-gradient(circle calc(var(--rail-w) / 2 - 5px) at center, rgba(255,255,255,0.07) 95%, transparent 96%);
                      opacity: 0;
                      pointer-events: none;
                      z-index: 0;
                    }
                    @media (hover: hover) {
                      :host(:hover) #container::before { opacity: 1; }
                    }
                    @media (hover: none) {
                      :host(:active) #container::before { opacity: 1; }
                    }

                - type: custom:button-card
                  template: [hemma_default]
                  show_name: false
                  show_state: false
                  show_entity_picture: true
                  entity_picture: /local/hemma/icons/decrease.svg
                  tap_action:
                    action: call-service
                    service: input_number.decrement
                    service_data:
                      entity_id: input_number.hemma_thermostat_target_temperature
                  styles:
                    card:
                      - height: 100%
                      - min-height: 0
                      - padding: 0
                      - background: transparent
                      - box-shadow: none !important
                      - border: none !important
                      - backdrop-filter: none !important
                      - "--button-card-ripple-color": transparent !important
                      - "-webkit-tap-highlight-color": transparent !important
                    img_cell:
                      - width: |
                          [[[
                            const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
                            return isMobile ? '74%' : '78%';
                          ]]]
                      - aspect-ratio: '1'
                  extra_styles: |
                    ha-card { background: transparent !important; }
                    #container::before {
                      content: '';
                      position: absolute;
                      inset: 0;
                      background: radial-gradient(circle calc(var(--rail-w) / 2 - 5px) at center, rgba(255,255,255,0.07) 95%, transparent 96%);
                      opacity: 0;
                      pointer-events: none;
                      z-index: 0;
                    }
                    @media (hover: hover) {
                      :host(:hover) #container::before { opacity: 1; }
                    }
                    @media (hover: none) {
                      :host(:active) #container::before { opacity: 1; }
                    }

  styles:
    card:
      - --rail-w: |
          [[[
            const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
            return isMobile ? '42px' : '52px';
          ]]]
      - --hemma-puck-padding: |
          [[[
            const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
            return isMobile ? '7px' : '8px';
          ]]]
      - --thermostat-control-opacity: |
          [[[
            return ['cool','heat'].includes(entity.state) ? '1' : '0.8';
          ]]]
    name:
      - opacity: |
          [[[
            const on = states[variables.thermostat_toggle_helper]?.state === "on";
            return on ? "0" : "1";
          ]]]
      - transition: opacity 0.25s
    state:
      - opacity: |
          [[[
            const on = states[variables.thermostat_toggle_helper]?.state === "on";
            return on ? "0" : "0.85";
          ]]]
      - transition: opacity 0.25s

    custom_fields:
      temp_puck:
        - position: absolute
        - z-index: 4
        - pointer-events: auto
        - '--mdc-ripple-color': transparent
        - '--paper-item-icon-active-color': transparent

      cooling_modes:
        - position: absolute
        - top: calc(var(--hemma-entity-inner-pad-current, var(--hemma-entity-inner-pad-desktop, 20px)) + (var(--hemma-entity-icon-size-current, var(--hemma-entity-icon-size-desktop, 34px)) - 20px) / 2)
        - right: var(--hemma-entity-inner-pad-current, var(--hemma-entity-inner-pad-desktop, 22px))
        - z-index: 2
        - line-height: 0
        - display: |
            [[[
              const on = states[variables.thermostat_toggle_helper]?.state === "on";
              return on ? "none" : "block";
            ]]]

      target_temperature:
        - position: absolute
        - inset: 0
        - z-index: 3
        - pointer-events: auto
        - display: |
            [[[
              const on = states[variables.thermostat_toggle_helper]?.state === "on";
              return on ? "block" : "none";
            ]]]
