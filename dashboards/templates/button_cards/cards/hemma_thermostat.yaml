hemma_thermostat:
  template: [hemma_entity]
  show_entity_picture: false
  show_icon: false
  show_label: false
  name: Thermostat

  variables:
    thermostat_toggle_helper: input_boolean.hemma_thermostat_overlay
    temp_sensor:
    show_toggle: |
      [[[
        return states[variables.thermostat_toggle_helper]?.state !== 'on';
      ]]]
    toggle_service: climate.set_hvac_mode
    toggle_service_data: |
      [[[
        if (['cool','heat'].includes(entity.state)) {
          return { entity_id: entity.entity_id, hvac_mode: 'off' };
        }
        return { entity_id: entity.entity_id, hvac_mode: states['input_select.hemma_thermostat_mode']?.state || 'cool' };
      ]]]

  state_display: |
    [[[
      const mode = entity.state;
      const target = entity.attributes.temperature;
      if (mode === 'cool') {
        return "Cooling to " + target + "°";
      } else if (mode === 'heat') {
        return "Heating to " + target + "°";
      } else {
        return "Off";
      }
    ]]]

  tap_action:
    action: call-service
    service: input_boolean.toggle
    service_data:
      entity_id: |
        [[[
          return variables.thermostat_toggle_helper;
        ]]]

  hold_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  custom_fields:
    temp_puck:
      card:
        type: custom:button-card
        entity: '[[[ return entity.entity_id ]]]'
        show_name: false
        show_icon: false
        show_state: false
        tap_action:
          action: more-info
        custom_fields:
          temp_display: |
            [[[
              let raw;
              const eid = variables.temp_sensor;
              if (eid && states[eid] && !["unknown","unavailable"].includes(states[eid].state)) {
                raw = states[eid].state;
              } else {
                raw = entity?.attributes?.current_temperature;
              }
              const n = Math.round(Number(raw));
              if (raw == null || Number.isNaN(n)) return '';

              const s = String(entity?.state || '').toLowerCase();
              const isActive = ['cool','heat'].includes(s);
              const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;

              // Circle size
              const size = isMobile ? 28 : 34;

              // Text size
              const fontSize = 48;

              // Shadow opacity — only applied when thermostat is active (cool/heat)
              const shadowOpacity = isActive ? 0.5 : 0;

              const uid = 'pm-' + entity.entity_id.replace(/[^a-z0-9]/gi, '-');
              const fid = uid + '-f';
              const fillVar = isActive ? 'var(--hemma-puck-icon-color-active)' : 'var(--hemma-puck-icon-color)';
              const textAttrs = `x="50" y="50" dominant-baseline="central" text-anchor="middle" font-weight="800" font-size="${fontSize}" font-family="system-ui,-apple-system,sans-serif"`;

              return `
                <svg width="${size}" height="${size}" viewBox="0 0 100 100" style="display:block">
                  <defs>
                    <mask id="${uid}">
                      <circle cx="50" cy="50" r="49" fill="white"/>
                      <text ${textAttrs} fill="black">${n}</text>
                    </mask>
                    <filter id="${fid}">
                      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
                      <feComposite in="blur" in2="SourceGraphic" operator="in"/>
                    </filter>
                  </defs>
                  <circle cx="50" cy="50" r="49" style="fill:${fillVar}" mask="url(#${uid})"/>
                  <text ${textAttrs} fill="rgba(0,0,0,${shadowOpacity})" filter="url(#${fid})">${n}</text>
                </svg>
              `.trim();
            ]]]
        styles:
          card:
            - background: transparent
            - width: auto
            - height: auto
            - padding: 0
            - border: none !important
            - opacity: 0.8
            - transition: opacity 0.2s ease, transform 0.15s ease, filter 0.2s ease
            - cursor: pointer
          name:
            - display: none
          custom_fields:
            temp_display:
              - line-height: 0
        extra_styles: |
          :host {
            display: block !important;
            width: 34px !important;
            height: 34px !important;
            overflow: hidden !important;
          }
          ha-card {
            box-shadow: none !important;
            border-radius: 50% !important;
            width: 34px !important;
            height: 34px !important;
            min-height: 0 !important;
            padding: 0 !important;
            box-sizing: border-box !important;
          }
          @media (max-width: 767px), (max-height: 600px) {
            :host { width: 28px !important; height: 28px !important; }
            ha-card { width: 28px !important; height: 28px !important; padding: 0 !important; box-sizing: border-box !important; }
          }
          @media (hover: hover) {
            :host ha-card:hover {
              opacity: 1 !important;
              filter: brightness(1.2);
              transform: scale(1.05);
              box-shadow: none !important;
            }
          }
          @media (hover: none) {
            :host ha-card:active {
              opacity: 1 !important;
              filter: brightness(1.2);
              transform: scale(1.05);
              box-shadow: none !important;
            }
          }

    target_temperature:
      card:
        type: custom:button-card
        template: [hemma_entity]
        entity: '[[[ return entity.entity_id ]]]'
        show_entity_picture: false
        show_icon: false
        name: Target Temp
        state_display: |
          [[[
            const raw = states['input_number.hemma_thermostat_target_temperature']?.state;
            const n = Number(raw);
            if (raw == null || raw === 'unknown' || raw === 'unavailable' || Number.isNaN(n)) return '';
            return Number.isInteger(n) ? `${n}°` : `${n.toFixed(1)}°`;
          ]]]
        tap_action:
          action: call-service
          service: input_boolean.toggle
          service_data:
            entity_id: |
              [[[
                return variables.thermostat_toggle_helper;
              ]]]

        extra_styles: |
          ha-card {
            box-shadow: none !important;
            border: none !important;
          }
          ha-card::before {
            display: none !important;
          }

        styles:
          card:
            - background: transparent !important
            - background-color: transparent !important
            - backdrop-filter: none !important
            - animation: none !important
            - box-shadow: none !important
            - border: none !important
            - padding-right: 0
          icon:
            - background: transparent !important
          img_cell:
            - background: transparent !important
          custom_fields:
            temperature_controls:
              - position: absolute
              - top: var(--hemma-entity-inner-pad-current, var(--hemma-entity-inner-pad-desktop, 22px))
              - right: |
                  [[[
                    const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
                    return isMobile ? '14px' : '22px';
                  ]]]
              - bottom: var(--hemma-entity-inner-pad-current, var(--hemma-entity-inner-pad-desktop, 22px))
              - width: var(--rail-w)
              - border-radius: |
                  [[[
                    const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
                    return isMobile ? '20px' : '24px';
                  ]]]
              - overflow: hidden
              - background: rgba(255,255,255,0.09)

        custom_fields:
          temperature_controls:
            card:
              type: custom:layout-card
              layout_type: custom:grid-layout
              layout:
                position: absolute
                inset: 0 0 0 auto
                width: var(--rail-w)
                grid-template-columns: 1fr
                grid-template-rows: repeat(3, 1fr)
                height: 100%
                margin: 0
                padding: 0
                align-items: stretch
                justify-items: stretch
              card_mod:
                style: |
                  ha-card {
                    background: transparent !important;
                    border: none !important;
                    box-shadow: none !important;
                  }
              cards:
                - type: custom:button-card
                  template: [hemma_default]
                  show_name: false
                  show_state: false
                  show_entity_picture: true
                  entity_picture: /local/hemma/icons/increase.svg
                  tap_action:
                    action: call-service
                    service: input_number.increment
                    service_data:
                      entity_id: input_number.hemma_thermostat_target_temperature
                  styles:
                    card:
                      - height: 100%
                      - min-height: 0
                      - padding: 0
                      - background: transparent
                      - box-shadow: none !important
                      - border: none !important
                      - backdrop-filter: none !important
                      - "--button-card-ripple-color": transparent !important
                      - "-webkit-tap-highlight-color": transparent !important
                    img_cell:
                      - width: |
                          [[[
                            const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
                            return isMobile ? '74%' : '78%';
                          ]]]
                      - aspect-ratio: '1'
                  extra_styles: |
                    ha-card { background: transparent !important; }
                    #container::before {
                      content: '';
                      position: absolute;
                      inset: 0;
                      background: radial-gradient(circle calc(var(--rail-w) / 2 - 5px) at center, rgba(255,255,255,0.07) 95%, transparent 96%);
                      opacity: 0;
                      pointer-events: none;
                      z-index: 0;
                    }
                    @media (hover: hover) {
                      :host(:hover) #container::before { opacity: 1; }
                    }
                    @media (hover: none) {
                      :host(:active) #container::before { opacity: 1; }
                    }

                - type: custom:button-card
                  template: [hemma_default]
                  show_state: false
                  name: SET
                  tap_action:
                    action: call-service
                    service: climate.set_temperature
                    service_data:
                      entity_id: '[[[ return entity.entity_id ]]]'
                      temperature: |
                        [[[
                          const st = states['input_number.hemma_thermostat_target_temperature'];
                          const n = parseFloat(st?.state);
                          return Number.isFinite(n) ? n : null;
                        ]]]
                  styles:
                    card:
                      - height: 100%
                      - min-height: 0
                      - padding: 0
                      - background: transparent
                      - box-shadow: none !important
                      - border: none !important
                      - backdrop-filter: none !important
                      - "--button-card-ripple-color": transparent !important
                      - "-webkit-tap-highlight-color": transparent !important
                    name:
                      - font-size: |
                          [[[
                            const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
                            return isMobile ? '10px' : '12px';
                          ]]]
                      - letter-spacing: 1px
                      - text-transform: uppercase
                      - font-weight: 600
                  extra_styles: |
                    ha-card { background: transparent !important; }
                    #container::before {
                      content: '';
                      position: absolute;
                      inset: 0;
                      background: radial-gradient(circle calc(var(--rail-w) / 2 - 5px) at center, rgba(255,255,255,0.07) 95%, transparent 96%);
                      opacity: 0;
                      pointer-events: none;
                      z-index: 0;
                    }
                    @media (hover: hover) {
                      :host(:hover) #container::before { opacity: 1; }
                    }
                    @media (hover: none) {
                      :host(:active) #container::before { opacity: 1; }
                    }

                - type: custom:button-card
                  template: [hemma_default]
                  show_name: false
                  show_state: false
                  show_entity_picture: true
                  entity_picture: /local/hemma/icons/decrease.svg
                  tap_action:
                    action: call-service
                    service: input_number.decrement
                    service_data:
                      entity_id: input_number.hemma_thermostat_target_temperature
                  styles:
                    card:
                      - height: 100%
                      - min-height: 0
                      - padding: 0
                      - background: transparent
                      - box-shadow: none !important
                      - border: none !important
                      - backdrop-filter: none !important
                      - "--button-card-ripple-color": transparent !important
                      - "-webkit-tap-highlight-color": transparent !important
                    img_cell:
                      - width: |
                          [[[
                            const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
                            return isMobile ? '74%' : '78%';
                          ]]]
                      - aspect-ratio: '1'
                  extra_styles: |
                    ha-card { background: transparent !important; }
                    #container::before {
                      content: '';
                      position: absolute;
                      inset: 0;
                      background: radial-gradient(circle calc(var(--rail-w) / 2 - 5px) at center, rgba(255,255,255,0.07) 95%, transparent 96%);
                      opacity: 0;
                      pointer-events: none;
                      z-index: 0;
                    }
                    @media (hover: hover) {
                      :host(:hover) #container::before { opacity: 1; }
                    }
                    @media (hover: none) {
                      :host(:active) #container::before { opacity: 1; }
                    }

  styles:
    card:
      - --rail-w: |
          [[[
            const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
            return isMobile ? '42px' : '52px';
          ]]]
      - --hemma-puck-padding: |
          [[[
            const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
            return isMobile ? '7px' : '8px';
          ]]]
      - --thermostat-control-opacity: |
          [[[
            return ['cool','heat'].includes(entity.state) ? '1' : '0.8';
          ]]]
    name:
      - opacity: |
          [[[
            const on = states[variables.thermostat_toggle_helper]?.state === "on";
            return on ? "0" : "1";
          ]]]
      - transition: opacity 0.25s
    state:
      - opacity: |
          [[[
            const on = states[variables.thermostat_toggle_helper]?.state === "on";
            return on ? "0" : "0.85";
          ]]]
      - transition: opacity 0.25s

    custom_fields:
      temp_puck:
        - position: absolute
        - top: var(--hemma-entity-inner-pad-current, var(--hemma-entity-inner-pad-desktop, 20px))
        - left: var(--hemma-entity-inner-pad-current, var(--hemma-entity-inner-pad-desktop, 20px))
        - width: |
            [[[
              const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
              return isMobile ? '28px' : '34px';
            ]]]
        - height: |
            [[[
              const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
              return isMobile ? '28px' : '34px';
            ]]]
        - overflow: hidden
        - z-index: 4
        - pointer-events: auto
        - '--mdc-ripple-color': transparent
        - '--paper-item-icon-active-color': transparent

      target_temperature:
        - position: absolute
        - inset: 0
        - z-index: 3
        - pointer-events: auto
        - display: |
            [[[
              const on = states[variables.thermostat_toggle_helper]?.state === "on";
              return on ? "block" : "none";
            ]]]
