hemma_lock:
  template: [hemma_entity]

  show_entity_picture: true
  show_icon: true
  show_label: false

  variables:
    show_toggle: true

  entity_picture: |
    [[[
      if (entity.state === 'unlocked') return '/local/hemma/icons/lock-open.svg';
      if (entity.state === 'unlocking') return '/local/hemma/icons/lock-unlocking.svg';
      return '/local/hemma/icons/lock.svg';
    ]]]

  state_display: |
    [[[
      const state = entity.state;
      if (state === 'locked') {
        return "Locked";
      } else if (state === 'unlocked') {
        return "Unlocked";
      } else if (state === 'locking') {
        return "Locking...";
      } else if (state === 'unlocking') {
        return "Unlocking...";
      } else {
        return "Unknown";
      }
    ]]]

  tap_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  hold_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  icon_tap_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  icon_hold_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  state:
    - value: unlocked
      styles:
        card:
          - background-color: var(--hemma-entity-background-active)
          - box-shadow: var(--button-card-box-shadow-active, var(--button-card-box-shadow)) !important
        name:
          - color: var(--hemma-entity-name-active, var(--primary-text-color))
        state:
          - color: var(--hemma-entity-state-active-color)
        img_cell:
          - opacity: var(--hemma-entity-picture-active-opacity, 1) !important
          - filter: var(--hemma-entity-picture-active-filter, none) !important
        entity_picture:
          - opacity: var(--hemma-entity-picture-active-opacity, 1) !important
          - filter: var(--hemma-entity-picture-active-filter, none) !important
    - value: unlocking
      styles:
        state:
          - color: var(--hemma-entity-state-active-color)

  styles:
    img_cell:
      - color: var(--hemma-entity-name-active, var(--primary-text-color)) !important
    entity_picture:
      - opacity: var(--hemma-entity-picture-active-opacity, 1) !important
    icon:
      - color: var(--hemma-entity-name-active, var(--primary-text-color)) !important

  extra_styles: |
    #img-cell { overflow: visible !important; }

    @media (hover: hover) {
      #img-cell:hover img {
        opacity: 1 !important;
        filter: brightness(1.2) !important;
        transform: scale(1.05);
      }
    }

    @media (hover: none) {
      #img-cell:active img {
        opacity: 1 !important;
        filter: brightness(1.2) !important;
        transform: scale(1.05);
      }
    }
