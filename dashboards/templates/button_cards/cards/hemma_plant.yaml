hemma_plant:
  template:
    - hemma_entity

  variables:
    icon: plant
    low_threshold: 30
    sensors: []   # list of extra sensor entity IDs to show in popup
    use_flower_card: false

  tap_action:
    haptic: light
    action: fire-dom-event
    browser_mod:
      service: browser_mod.popup
      data:
        title: ""
        adaptive: true
        size: "[[[ return window.innerWidth >= 1250 ? 'auto' : 'fullscreen'; ]]]"
        content: |
          [[[
            const plant = entity?.entity_id;
            const sensors = Array.isArray(variables.sensors)
              ? variables.sensors.filter(Boolean)
              : [];

            if (variables.use_flower_card) {
              return {
                type: 'custom:flower-card',
                entity: plant,
                display_type: 'full',
                bars_per_row: 2,
                hide_species: false,
                hide_image: true,
                tap_action: { action: 'none' },
                hold_action: { action: 'none' },
                double_tap_action: { action: 'none' },
                card_mod: {
                  style: {
                    '.': `
                      :host {
                        --ha-card-background: transparent !important;
                        --primary-text-color: rgba(255,255,255,0.96) !important;
                        --secondary-text-color: rgba(255,255,255,0.64) !important;
                      }
                      ha-card {
                        background: transparent !important;
                        --ha-card-background: transparent !important;
                        box-shadow: none !important;
                        border: none !important;
                        backdrop-filter: none !important;
                        -webkit-backdrop-filter: none !important;
                        padding: 0 !important;
                        margin: 0 !important;
                        filter: none !important;
                      }
                      ha-card:hover,
                      ha-card:focus,
                      ha-card:active {
                        background: transparent !important;
                        box-shadow: none !important;
                        filter: none !important;
                      }
                    `,
                    '$': `
                      .title,
                      .name,
                      .plant-name,
                      .header,
                      .header * {
                        color: rgba(255,255,255,0.96) !important;
                        opacity: 1 !important;
                        -webkit-text-fill-color: rgba(255,255,255,0.96) !important;
                      }
                      .secondary,
                      .subtitle,
                      .species,
                      .plant-species,
                      .header .secondary,
                      .header .subtitle {
                        color: rgba(255,255,255,0.64) !important;
                        opacity: 1 !important;
                        -webkit-text-fill-color: rgba(255,255,255,0.64) !important;
                      }
                      .header ha-icon,
                      .header .icon,
                      .title ha-icon,
                      .plant-name ha-icon,
                      .plant-status,
                      .status-icon {
                        width: 22px !important;
                        height: 22px !important;
                        min-width: 22px !important;
                        min-height: 22px !important;
                        transform: scale(0.82) !important;
                        transform-origin: center !important;
                      }
                      .value,
                      .state,
                      .metric-value,
                      .sensor-value,
                      .bar-value,
                      .value-text {
                        line-height: 1.05 !important;
                        color: rgba(255,255,255,0.96) !important;
                        -webkit-text-fill-color: rgba(255,255,255,0.96) !important;
                      }
                      .unit,
                      .unit-of-measurement,
                      .sensor-unit,
                      sup,
                      sub {
                        font-size: 0.82em !important;
                        opacity: 0.88 !important;
                        line-height: 1 !important;
                      }
                    `
                  }
                }
              };
            }

            const plantName =
              states[plant]?.attributes?.friendly_name ||
              entity?.attributes?.friendly_name ||
              'Plant';

            const sensorRows = sensors.map((sensor) => {
              const fallback = states[sensor]?.attributes?.friendly_name || sensor.split('.').pop() || '';
              const plantName = (
                states[plant]?.attributes?.friendly_name ||
                entity?.attributes?.friendly_name ||
                ''
              ).trim();

              let cleanName = fallback;

              if (plantName) {
                const escaped = plantName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                cleanName = cleanName.replace(new RegExp(`^${escaped}\\s*`, 'i'), '');
              }

              cleanName = cleanName
                .replace(/_/g, ' ')
                .trim()
                .replace(/\w\S*/g, (txt) => txt.charAt(0).toUpperCase() + txt.slice(1).toLowerCase());

              return {
                entity: sensor,
                name: cleanName || fallback
              };
            });

            return {
            type: 'vertical-stack',
            cards: [
              {
                type: 'markdown',
                content: `# ${plantName}`,
                card_mod: {
                  style: `
                    ha-card {
                      background: transparent !important;
                      --ha-card-background: transparent !important;
                      box-shadow: none !important;
                      border: none !important;
                      backdrop-filter: none !important;
                      -webkit-backdrop-filter: none !important;
                      filter: none !important;
                      padding: 20px 32px 12px 32px !important;
                      margin: 0 !important;
                    }
                    ha-card:hover,
                    ha-card:focus,
                    ha-card:active {
                      background: transparent !important;
                      box-shadow: none !important;
                      filter: none !important;
                    }
                    .card-content {
                      padding: 0 !important;
                    }
                    ha-markdown {
                      color: rgba(255,255,255,0.96) !important;
                    }
                    ha-markdown h1 {
                      margin: 0 !important;
                      padding: 0 !important;
                      font-size: 2rem !important;
                      font-weight: 500 !important;
                      line-height: 1.1 !important;
                      letter-spacing: -0.02em !important;
                      color: rgba(255,255,255,0.96) !important;
                    }
                  `
                }
              },
              {
                type: 'entities',
                entities: sensorRows,
                show_header_toggle: false,
                card_mod: {
                  style: `
                    ha-card {
                      background: transparent !important;
                      --ha-card-background: transparent !important;
                      box-shadow: none !important;
                      border: none !important;
                      backdrop-filter: none !important;
                      -webkit-backdrop-filter: none !important;
                      filter: none !important;
                      padding: 0 !important;
                      margin: 0 !important;
                    }
                    ha-card:hover,
                    ha-card:focus,
                    ha-card:active {
                      background: transparent !important;
                      box-shadow: none !important;
                      filter: none !important;
                    }
                    .card-content {
                      padding: 0 32px 20px 32px !important;
                    }
                    hui-generic-entity-row {
                      padding-right: 8px !important;
                    }
                  `
                }
              }
            ]
          };
          ]]]

