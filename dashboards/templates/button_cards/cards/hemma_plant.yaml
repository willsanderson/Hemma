hemma_plant:
  template:
    - hemma_entity
    - hemma_plant_popup

  variables:
    icon: plant
    low_threshold: 30
    sensors: []   # list of extra sensor entity IDs to show in popup
    use_flower_card: false

  hold_action:
    action: more-info

  state_display: |
    [[[
      if (!entity?.state || entity.state === 'unavailable') return '— %';

      if (entity.state === 'ok') return 'Healthy';
      if (entity.state === 'problem') return 'Needs Attention';

      const val = parseFloat(entity.state);
      if (!Number.isNaN(val)) return `${Math.round(val)} %`;

      const attr = parseFloat(entity.attributes?.moisture);
      if (!Number.isNaN(attr)) return `${Math.round(attr)} %`;
      return '— %';
    ]]]

  state:
    - operator: template
      value: |
        [[[
          if (entity?.state === 'problem') return true;
          const threshold = Number(variables.low_threshold ?? 30);
          const val = parseFloat(entity?.state);
          if (Number.isFinite(val)) return val <= threshold;
          const attr = parseFloat(entity?.attributes?.moisture);
          return Number.isFinite(attr) && attr <= threshold;
        ]]]
      styles:
        card:
          - background: var(--hemma-entity-background-active)
          - box-shadow: var(--button-card-box-shadow-active, var(--button-card-box-shadow)) !important
        name:
          - color: var(--hemma-entity-name-active, var(--primary-text-color))
        state:
          - color: var(--hemma-entity-state-active-color)
        img_cell:
          - opacity: var(--hemma-entity-picture-active-opacity, 1) !important
          - filter: var(--hemma-entity-picture-active-filter, none) !important
        entity_picture:
          - opacity: var(--hemma-entity-picture-active-opacity, 1) !important
          - filter: var(--hemma-entity-picture-active-filter, none) !important

  extra_styles: |
    @media (hover: hover) {
      #img-cell:hover {
        transform: scale(1.05);
        transition: transform 0.15s ease;
      }
      #img-cell:hover img {
        opacity: 1 !important;
        filter: brightness(1.2) !important;
      }
    }
    @media (hover: none) {
      #img-cell:active {
        transform: scale(1.05);
      }
      #img-cell:active img {
        opacity: 1 !important;
        filter: brightness(1.2) !important;
      }
    }
