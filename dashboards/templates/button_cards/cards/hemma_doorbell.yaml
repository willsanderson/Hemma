hemma_doorbell:
  template:
    - hemma_entity
  tap_action:
    action: more-info
  show_entity_picture: true
  show_name: true
  show_state: true
  name: Doorbell
  hold_action:
    action: more-info
  icon_tap_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  styles:
    img_cell:
      - color: var(--hemma-entity-name-active, var(--primary-text-color)) !important
    entity_picture:
      - opacity: var(--hemma-entity-picture-active-opacity, 1) !important
    icon:
      - color: var(--hemma-entity-name-active, var(--primary-text-color)) !important

  extra_styles: |
    #img-cell { overflow: visible !important; }
    @media (hover: hover) {
      #img-cell:hover img {
        opacity: 1 !important;
        filter: brightness(1.2) !important;
        transform: scale(1.05);
      }
    }
    @media (hover: none) {
      #img-cell:active img {
        opacity: 1 !important;
        filter: brightness(1.2) !important;
        transform: scale(1.05);
      }
    }