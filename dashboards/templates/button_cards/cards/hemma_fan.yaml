hemma_fan:
  template:
    - hemma_entity

  show_entity_picture: true
  show_icon: true
  show_name: true
  show_state: true
  name: Fan

  tap_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  hold_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  icon_tap_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  icon_hold_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  styles:
    card:
      - --hemma-fan-animation: >
          [[[
            const s = String(entity?.state || '').toLowerCase();
            const isOn = s === 'on';
            const prev = this._hemmaPrevFan;
            this._hemmaPrevFan = isOn;
            const justOn  = isOn  && prev === false;
            const justOff = !isOn && prev === true;
            if (isOn) {
              return justOn
                ? 'hemma-fan-spin 1.5s ease-in 1, hemma-fan-spin 0.9s linear 1.5s infinite'
                : 'hemma-fan-spin 0.9s linear infinite';
            }
            if (justOff) return 'hemma-fan-coast 1.5s ease-out 1 forwards';
            return 'none';
          ]]]

    entity_picture:
      - width: 100%
      - height: 100%
      - object-fit: contain
      - opacity: 0.8
      - transition: opacity 0.2s ease, filter 0.2s ease
      - cursor: pointer

    img_cell:
      - background: transparent !important
      - box-shadow: none !important
      - transition: filter 0.2s ease
      - cursor: pointer

  extra_styles: |
    #img-cell {
      overflow: visible !important;
    }

    /* Fan icon animation */
    @keyframes hemma-fan-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes hemma-fan-coast {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    #img-cell img {
      transform-origin: center center !important;
      animation: var(--hemma-fan-animation, none) !important;
    }

    /* Hover effect for desktop */
    @media (hover: hover) {
      #img-cell:hover img {
        opacity: 1 !important;
        filter: brightness(1.2) !important;
      }
      #img-cell:hover {
        transform: scale(1.05);
        transition: transform 0.15s ease;
      }
    }

    /* Active effect for touch */
    @media (hover: none) {
      #img-cell:active img {
        opacity: 1 !important;
        filter: brightness(1.2) !important;
      }
      #img-cell:active {
        transform: scale(1.05);
        transition: transform 0.15s ease;
      }
    }
