# Indoor Temperature Badge
# Shows indoor temperature sensor with comfort label and value.
# Tap: opens hemma_climate_popup (shared climate popup).
hemma_badge_temp:
  template: [hemma_badge_base, hemma_popup_base, hemma_climate_popup]

  variables:
    enabled: true
    temp_unit: 'F'  # 'C' or 'F'
    room_name: null
    entity_quality: null
    entity_temp: null
    entity_humidity: null
    entity_pm25: null
    entity_pm10: null
    entity_voc: null
    entity_co2: null

  icon: mdi:thermometer

  extra_styles: >
    [[[
      const ev = variables?.enabled;
      const enabled = (ev === undefined || ev === null) ? true :
        (typeof ev === 'boolean') ? ev :
        (typeof ev === 'number') ? ev !== 0 :
        !['false','0','no','off','disabled'].includes(String(ev).trim().toLowerCase());

      const hasEnt = !!entity?.entity_id;
      const stRaw  = String(entity?.state ?? '').trim();
      const st     = stRaw.toLowerCase();
      const v      = parseFloat(stRaw);
      const hide   = !enabled || !hasEnt || !stRaw || ['unknown','unavailable','none'].includes(st) || Number.isNaN(v);

      const unit = String(variables?.temp_unit || 'F').toUpperCase();
      const t = (unit === 'F')
        ? { cool: 70, warm: 81 }
        : { cool: 21, warm: 27 };

      let svgUrl;
      if      (v <= t.cool) svgUrl = '/local/hemma/icons/temp-low.svg';
      else if (v <= t.warm) svgUrl = '/local/hemma/icons/temp-medium.svg';
      else                  svgUrl = '/local/hemma/icons/temp-high.svg';

      return `
        :host{display:${hide ? 'none' : 'inline-block'} !important;}
        #img-cell, .img-cell { position: relative; }
        #img-cell #icon, .img-cell #icon { color: transparent !important; opacity: 0 !important; }
        #img-cell::before, .img-cell::before {
          content: '';
          position: absolute;
          inset: 0;
          background-color: var(--hemma-icon-color, var(--primary-text-color));
          -webkit-mask: url('${svgUrl}') no-repeat center / 85% 85%;
          mask: url('${svgUrl}') no-repeat center / 85% 85%;
          transform: translateZ(0);
        }
      `;
    ]]]

  styles:
    card:
      - display: >
          [[[
            const ev = variables?.enabled;
            const enabled = (ev === undefined || ev === null) ? true :
              (typeof ev === 'boolean') ? ev :
              (typeof ev === 'number') ? ev !== 0 :
              !['false','0','no','off','disabled'].includes(String(ev).trim().toLowerCase());

            const hasEnt = !!entity?.entity_id;
            const stRaw  = String(entity?.state ?? '').trim();
            const st     = stRaw.toLowerCase();
            const v      = parseFloat(stRaw);
            const hide   = !enabled || !hasEnt || !stRaw || ['unknown','unavailable','none'].includes(st) || Number.isNaN(v);

            return hide ? 'none' : 'inline-grid';
          ]]]
      - --hemma-icon-color: >
          [[[
            const v    = parseFloat(entity?.state);
            const unit = String(variables?.temp_unit || 'F').toUpperCase();
            if (isNaN(v)) return 'var(--disabled-text-color)';
            const t = (unit === 'F')
              ? { veryCold: 65, cool: 70, comfortable: 76, warm: 81, hot: 85 }
              : { veryCold: 18, cool: 21, comfortable: 24, warm: 27, hot: 29 };
            if (v <= t.veryCold)    return 'var(--hemma-badge-temp-very-cold-color)';
            if (v <= t.cool)        return 'var(--hemma-badge-temp-cool-color)';
            if (v <= t.comfortable) return 'var(--hemma-badge-temp-comfortable-color)';
            if (v <= t.warm)        return 'var(--hemma-badge-temp-warm-color)';
            if (v <= t.hot)         return 'var(--hemma-badge-temp-hot-color)';
            return 'var(--hemma-badge-temp-very-hot-color)';
          ]]]
    icon:
      - color: transparent

  name: >
    [[[
      const v    = parseFloat(entity?.state);
      const unit = String(variables?.temp_unit || 'F').toUpperCase();
      if (isNaN(v)) return '';

      const t = (unit === 'F')
        ? { veryCold: 65, cool: 70, comfortable: 76, warm: 81, hot: 85 }
        : { veryCold: 18, cool: 21, comfortable: 24, warm: 27, hot: 29 };

      let label = 'Unknown';
      if      (v <= t.veryCold)    label = 'Very Cold';
      else if (v <= t.cool)        label = 'Cool';
      else if (v <= t.comfortable) label = 'Comfortable';
      else if (v <= t.warm)        label = 'Warm';
      else if (v <= t.hot)         label = 'Hot';
      else                         label = 'Very Hot';

      const dispVal = `${Math.round(v)}°`;
      const esc = (s) => String(s || '').replaceAll('"', '&quot;');

      return `
        <div class="badge-wrap">
          <div class="badge-title">Temperature</div>
          <div class="badge-sub">${esc(label)} · ${dispVal}</div>
        </div>
      `;
    ]]]
