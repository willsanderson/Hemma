# Humidity Badge
# Shows humidity sensor with color-coded status.
# Tap: opens hemma_climate_popup (shared climate popup).
hemma_badge_humidity:
  template: [hemma_badge_base, hemma_popup_base, hemma_climate_popup]

  variables:
    enabled: true
    room_name: null
    entity_quality: null
    entity_temp: null
    entity_humidity: null
    entity_pm25: null
    entity_pm10: null
    entity_voc: null
    entity_co2: null

  icon: mdi:water-percent

  extra_styles: >
    [[[
      const SVG_URL = '/local/hemma/icons/humidity.svg';

      const ev = variables?.enabled;
      const enabled = (ev === undefined || ev === null) ? true :
        (typeof ev === 'boolean') ? ev :
        (typeof ev === 'number') ? ev !== 0 :
        !['false','0','no','off','disabled'].includes(String(ev).trim().toLowerCase());

      const hasEnt  = !!entity?.entity_id;
      const stRaw   = String(entity?.state ?? '').trim();
      const st      = stRaw.toLowerCase();
      const v       = parseFloat(stRaw);
      const hide    = !enabled || !hasEnt || !stRaw || ['unknown','unavailable','none'].includes(st) || Number.isNaN(v);

      return `
        :host{display:${hide ? 'none' : 'inline-block'} !important;}
        #img-cell, .img-cell { position: relative; }
        #img-cell #icon, .img-cell #icon { color: transparent !important; opacity: 0 !important; }
        #img-cell::before, .img-cell::before {
          content: '';
          position: absolute;
          inset: 0;
          background-color: var(--hemma-icon-color, var(--primary-text-color));
          -webkit-mask: url('${SVG_URL}') no-repeat center / 85% 85%;
          mask: url('${SVG_URL}') no-repeat center / 85% 85%;
          transform: translateZ(0);
        }
      `;
    ]]]

  styles:
    card:
      - display: >
          [[[
            const ev = variables?.enabled;
            const enabled = (ev === undefined || ev === null) ? true :
              (typeof ev === 'boolean') ? ev :
              (typeof ev === 'number') ? ev !== 0 :
              !['false','0','no','off','disabled'].includes(String(ev).trim().toLowerCase());

            const hasEnt  = !!entity?.entity_id;
            const stRaw   = String(entity?.state ?? '').trim();
            const st      = stRaw.toLowerCase();
            const v       = parseFloat(stRaw);
            const hide    = !enabled || !hasEnt || !stRaw || ['unknown','unavailable','none'].includes(st) || Number.isNaN(v);

            return hide ? 'none' : 'inline-grid';
          ]]]
      - --hemma-icon-color: >
          [[[
            const v = parseFloat(entity?.state);
            if (isNaN(v)) return 'var(--disabled-text-color)';
            if (v <= 29.99) return 'var(--hemma-badge-humidity-dry-color)';
            if (v >= 61)    return 'var(--hemma-badge-humidity-high-color)';
            return 'var(--hemma-badge-climate-color)';
          ]]]
    icon:
      - color: transparent

  name: >
    [[[
      const v = parseFloat(entity?.state);
      let label = 'Unknown';
      if (!isNaN(v)) {
        if (v <= 29.99)   label = 'Very Dry';
        else if (v >= 61) label = 'High';
        else              label = 'Good';
      }

      const esc = (t) => String(t || '').replaceAll('"','&quot;');
      const vStr = !isNaN(v) ? ` · ${Math.round(v)}%` : '';

      return `
        <div class="badge-wrap">
          <div class="badge-title">Humidity</div>
          <div class="badge-sub">${esc(label)}${vStr}</div>
        </div>
      `;
    ]]]
