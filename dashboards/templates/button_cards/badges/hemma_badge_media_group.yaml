# Media Group Badge
hemma_badge_media_group:
  template: [hemma_badge_base]

  entity: input_select.hemma_expanded_row

  variables:
    enabled: true
    pause_timeout_minutes: 5
    entity_1: null
    entity_2: null
    entity_3: null
    entity_4: null
    entity_5: null
    entity_6: null
    entity_7: null
    entity_8: null
    entity_9: null
    entity_10: null
    entity_11: null
    entity_12: null
    entity_13: null
    entity_14: null
    steam_online_entity: null
    steam_game_entity: null

  show_state: false
  show_label: false
  show_icon: true
  icon: mdi:television-speaker

  tap_action:
    action: call-service
    service: input_select.select_option
    service_data:
      entity_id: input_select.hemma_expanded_row
      option: >
        [[[
          return states['input_select.hemma_expanded_row']?.state === 'media' ? 'none' : 'media';
        ]]]

  hold_action:
    action: none
  double_tap_action:
    action: none

  triggers_update:
    - '[[[ return variables?.entity_1 ]]]'
    - '[[[ return variables?.entity_2 ]]]'
    - '[[[ return variables?.entity_3 ]]]'
    - '[[[ return variables?.entity_4 ]]]'
    - '[[[ return variables?.entity_5 ]]]'
    - '[[[ return variables?.entity_6 ]]]'
    - '[[[ return variables?.entity_7 ]]]'
    - '[[[ return variables?.entity_8 ]]]'
    - '[[[ return variables?.entity_9 ]]]'
    - '[[[ return variables?.entity_10 ]]]'
    - '[[[ return variables?.entity_11 ]]]'
    - '[[[ return variables?.entity_12 ]]]'
    - '[[[ return variables?.entity_13 ]]]'
    - '[[[ return variables?.entity_14 ]]]'
    - '[[[ return variables?.steam_online_entity ]]]'
    - '[[[ return variables?.steam_game_entity ]]]'

  extra_styles: >
    [[[
      const SVG_URL  = "/local/hemma/icons/media.svg";
      const MASK_PCT = 100;
      const INSET_PX = 2;

      const enabled = (v) => {
        if (v === undefined || v === null) return true;
        if (typeof v === 'boolean') return v;
        if (typeof v === 'number') return v !== 0;
        return !['false','0','no','off','disabled'].includes(String(v).trim().toLowerCase());
      };

      const isActive = (eid) => {
        if (!eid) return false;
        const s = hass.states[eid];
        if (!s) return false;
        const st = String(s.state || '').toLowerCase();
        if (['unavailable','unknown','off','standby'].includes(st)) return false;
        if (['playing','buffering','on'].includes(st)) return true;
        const a = s.attributes || {};
        const hasContent = !!(
          String(a.media_title || '').trim() ||
          String(a.media_artist || a.artist || a.media_album_artist || '').trim()
        );
        if (!hasContent) return false;
        if (st === 'paused') {
          const timeout = Number(variables?.pause_timeout_minutes ?? 5);
          if (timeout <= 0) return true;
          return ((new Date() - new Date(s.last_changed)) / 60000) <= timeout;
        }
        return st === 'idle';
      };

      const isSteamActive = () => {
        const onlineEntity = variables?.steam_online_entity;
        const gameEntity = variables?.steam_game_entity;
        if (!onlineEntity || !gameEntity) return false;

        const online = String(hass.states[onlineEntity]?.state || '').toLowerCase();
        const game = String(hass.states[gameEntity]?.state || '').toLowerCase();

        return online === 'online' && !!game && game !== 'unknown' && game !== 'unavailable';
      };

      const eids = [
        variables?.entity_1, variables?.entity_2, variables?.entity_3, variables?.entity_4,
        variables?.entity_5, variables?.entity_6, variables?.entity_7, variables?.entity_8,
        variables?.entity_9, variables?.entity_10, variables?.entity_11, variables?.entity_12,
        variables?.entity_13, variables?.entity_14
      ].filter(Boolean);

      const activeCount = enabled(variables?.enabled)
        ? eids.filter(e => isActive(e)).length + (isSteamActive() ? 1 : 0)
        : 0;

      const show = enabled(variables?.enabled) && activeCount > 0;

      return `
        :host{display:${show ? 'inline-block' : 'none'} !important;}

        #img-cell, .img-cell{ position: relative; }

        #img-cell #icon, .img-cell #icon{
          color: transparent !important;
          opacity: 0 !important;
          --icon-primary-color: var(--hemma-icon-color) !important;
          --paper-item-icon-color: var(--hemma-icon-color) !important;
          --state-icon-color: var(--hemma-icon-color) !important;
          --card-mod-icon-color: var(--hemma-icon-color) !important;
        }

        #img-cell::before,
        .img-cell::before{
          content: '';
          position: absolute;
          inset: ${INSET_PX}px;
          background-color: var(--hemma-icon-color, var(--primary-text-color)) !important;

          -webkit-mask: url('${SVG_URL}') no-repeat center / ${MASK_PCT}% ${MASK_PCT}%;
          mask: url('${SVG_URL}') no-repeat center / ${MASK_PCT}% ${MASK_PCT}%;

          transform: translateZ(0);
        }
      `;
    ]]]

  styles:
    icon:
      - color: transparent

    card:
      - --badge-icon-size-current: calc(var(--badge-icon-size, 30px) + 1px)
      - background: >
          [[[
            return entity?.state === 'media'
              ? 'var(--badge-active-color, rgba(255,255,255,0.85))'
              : 'var(--badge-background, rgba(0,0,0,0.18))';
          ]]]
      - display: >
          [[[
            const enabled = (v) => {
              if (v === undefined || v === null) return true;
              if (typeof v === 'boolean') return v;
              if (typeof v === 'number') return v !== 0;
              return !['false','0','no','off','disabled'].includes(String(v).trim().toLowerCase());
            };

            if (!enabled(variables?.enabled)) return 'none';

            const isActive = (eid) => {
              if (!eid) return false;
              const s = hass.states[eid];
              if (!s) return false;
              const st = String(s.state || '').toLowerCase();
              if (['unavailable','unknown','off','standby'].includes(st)) return false;
              if (['playing','buffering','on'].includes(st)) return true;
              const a = s.attributes || {};
              const hasContent = !!(
                String(a.media_title || '').trim() ||
                String(a.media_artist || a.artist || a.media_album_artist || '').trim()
              );
              if (!hasContent) return false;
              if (st === 'paused') {
                const timeout = Number(variables?.pause_timeout_minutes ?? 5);
                if (timeout <= 0) return true;
                return ((new Date() - new Date(s.last_changed)) / 60000) <= timeout;
              }
              return st === 'idle';
            };

            const isSteamActive = () => {
              const onlineEntity = variables?.steam_online_entity;
              const gameEntity = variables?.steam_game_entity;
              if (!onlineEntity || !gameEntity) return false;

              const online = String(hass.states[onlineEntity]?.state || '').toLowerCase();
              const game = String(hass.states[gameEntity]?.state || '').toLowerCase();

              return online === 'online' && !!game && game !== 'unknown' && game !== 'unavailable';
            };

            const eids = [
              variables?.entity_1, variables?.entity_2, variables?.entity_3, variables?.entity_4,
              variables?.entity_5, variables?.entity_6, variables?.entity_7, variables?.entity_8,
              variables?.entity_9, variables?.entity_10, variables?.entity_11, variables?.entity_12,
              variables?.entity_13, variables?.entity_14
            ].filter(Boolean);

            const activeCount = eids.filter(e => isActive(e)).length + (isSteamActive() ? 1 : 0);
            return activeCount > 0 ? 'inline-grid' : 'none';
          ]]]
      - --badge-title-color: >
          [[[
            return entity?.state === 'media' ? 'rgba(0,0,0,0.85)' : 'var(--primary-text-color)';
          ]]]
      - --badge-sub-color: >
          [[[
            return entity?.state === 'media' ? 'rgba(0,0,0,0.6)' : 'var(--secondary-text-color)';
          ]]]
      - --hemma-icon-color: >
          [[[
            if (entity?.state === 'media') return 'rgba(0,0,0,0.75)';

            const isActive = (eid) => {
              if (!eid) return false;
              const s = hass.states[eid];
              if (!s) return false;
              const st = String(s.state || '').toLowerCase();
              if (['unavailable','unknown','off','standby'].includes(st)) return false;
              if (['playing','buffering','on'].includes(st)) return true;
              const a = s.attributes || {};
              const hasContent = !!(
                String(a.media_title || '').trim() ||
                String(a.media_artist || a.artist || a.media_album_artist || '').trim()
              );
              if (!hasContent) return false;
              if (st === 'paused') {
                const timeout = Number(variables?.pause_timeout_minutes ?? 5);
                if (timeout <= 0) return true;
                return ((new Date() - new Date(s.last_changed)) / 60000) <= timeout;
              }
              return st === 'idle';
            };

            const isSteamActive = () => {
              const onlineEntity = variables?.steam_online_entity;
              const gameEntity = variables?.steam_game_entity;
              if (!onlineEntity || !gameEntity) return false;

              const online = String(hass.states[onlineEntity]?.state || '').toLowerCase();
              const game = String(hass.states[gameEntity]?.state || '').toLowerCase();

              return online === 'online' && !!game && game !== 'unknown' && game !== 'unavailable';
            };

            const eids = [
              variables?.entity_1, variables?.entity_2, variables?.entity_3, variables?.entity_4,
              variables?.entity_5, variables?.entity_6, variables?.entity_7, variables?.entity_8,
              variables?.entity_9, variables?.entity_10, variables?.entity_11, variables?.entity_12,
              variables?.entity_13, variables?.entity_14
            ];

            const anyActive = eids.some(e => isActive(e)) || isSteamActive();
            return anyActive ? 'var(--hemma-badge-media-color)' : 'var(--badge-title-inactive)';
          ]]]
      - --icon-primary-color: var(--hemma-icon-color)
      - --paper-item-icon-color: var(--hemma-icon-color)
      - --state-icon-color: var(--hemma-icon-color)
      - --card-mod-icon-color: var(--hemma-icon-color)

  name: >
    [[[
      const isActive = (eid) => {
        if (!eid) return false;
        const s = hass.states[eid];
        if (!s) return false;
        const st = String(s.state || '').toLowerCase();
        if (['unavailable','unknown','off','standby'].includes(st)) return false;
        if (['playing','buffering','on'].includes(st)) return true;
        const a = s.attributes || {};
        const hasContent = !!(
          String(a.media_title || '').trim() ||
          String(a.media_artist || a.artist || a.media_album_artist || '').trim()
        );
        if (!hasContent) return false;
        if (st === 'paused') {
          const timeout = Number(variables?.pause_timeout_minutes ?? 5);
          if (timeout <= 0) return true;
          return ((new Date() - new Date(s.last_changed)) / 60000) <= timeout;
        }
        return st === 'idle';
      };

      const isSteamActive = () => {
        const onlineEntity = variables?.steam_online_entity;
        const gameEntity = variables?.steam_game_entity;
        if (!onlineEntity || !gameEntity) return false;

        const online = String(hass.states[onlineEntity]?.state || '').toLowerCase();
        const game = String(hass.states[gameEntity]?.state || '').toLowerCase();

        return online === 'online' && !!game && game !== 'unknown' && game !== 'unavailable';
      };

      const eids = [
        variables?.entity_1, variables?.entity_2, variables?.entity_3, variables?.entity_4,
        variables?.entity_5, variables?.entity_6, variables?.entity_7, variables?.entity_8,
        variables?.entity_9, variables?.entity_10, variables?.entity_11, variables?.entity_12,
        variables?.entity_13, variables?.entity_14
      ].filter(Boolean);

      const activeCount = eids.filter(e => isActive(e)).length + (isSteamActive() ? 1 : 0);
      const sub = activeCount === 1 ? '1 Playing' : `${activeCount} Playing`;

      return `
        <div class="badge-wrap">
          <div class="badge-title">Media</div>
          <div class="badge-sub">${sub}</div>
        </div>
      `;
    ]]]
